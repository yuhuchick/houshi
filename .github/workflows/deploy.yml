name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack project files
        run: |
          set -euo pipefail
          tar --exclude='.git' --exclude='node_modules' --exclude='release.tar.gz' -czf release.tar.gz .

      - name: Upload release package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ vars.SSH_PORT != '' && vars.SSH_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: release.tar.gz
          target: /tmp

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ vars.SSH_PORT != '' && vars.SSH_PORT || 22 }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ vars.DEPLOY_PATH }}"
            rm -rf ./*
            tar -xzf /tmp/release.tar.gz -C "${{ vars.DEPLOY_PATH }}"
            rm -f /tmp/release.tar.gz
            npm ci --omit=dev
            pm2 reload houshi || pm2 start ecosystem.config.cjs
