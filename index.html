<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#080806" />
    <title>后室：潮湿灯影</title>
    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050504;
        color: #f5f1d4;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        touch-action: none;
      }

      #boot {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: contain;
        touch-action: pan-y;
        padding: max(24px, env(safe-area-inset-top)) 22px max(28px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at center, rgba(255, 245, 156, 0.14), transparent 42%),
          linear-gradient(180deg, #1b190c, #050504);
      }

      #boot input {
        user-select: text;
        -webkit-user-select: text;
        touch-action: auto;
      }

      canvas {
        display: block;
      }

      .boot-card {
        width: min(420px, 100%);
        flex-shrink: 0;
        margin-top: auto;
        margin-bottom: auto;
        padding: 24px;
        border: 1px solid rgba(255, 244, 184, 0.24);
        border-radius: 22px;
        background: rgba(18, 16, 9, 0.82);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
      }

      .boot-card h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0.08em;
      }

      .boot-card p {
        margin: 8px 0;
        color: rgba(245, 241, 212, 0.78);
        line-height: 1.55;
        font-size: 14px;
      }

      .boot-card button,
      .primary-button {
        width: 100%;
        min-height: 52px;
        margin-top: 18px;
        border: 0;
        border-radius: 16px;
        background: #f0d96b;
        color: #191508;
        font-weight: 800;
        font-size: 16px;
        box-shadow: 0 10px 22px rgba(240, 217, 107, 0.2);
      }

      .save-list {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .save-slot {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
        padding: 10px;
        border: 1px solid rgba(245, 241, 212, 0.14);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
      }

      .save-slot strong {
        display: block;
        color: #fff7ae;
        font-size: 14px;
      }

      .save-slot span {
        display: block;
        margin-top: 3px;
        color: rgba(245, 241, 212, 0.68);
        font-size: 12px;
        line-height: 1.35;
      }

      .multiplayer-box {
        display: grid;
        gap: 10px;
        margin-top: 16px;
        padding: 12px;
        border: 1px solid rgba(245, 241, 212, 0.16);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
      }

      .multiplayer-box label {
        color: rgba(245, 241, 212, 0.76);
        font-size: 13px;
        line-height: 1.35;
      }

      .multiplayer-box input {
        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(245, 241, 212, 0.18);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.32);
        color: #fff7ae;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.14em;
        padding: 0 12px;
        text-transform: uppercase;
        user-select: text;
      }

      .multiplayer-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .multiplayer-actions button {
        min-height: 42px;
        border: 1px solid rgba(245, 241, 212, 0.2);
        border-radius: 12px;
        background: rgba(240, 217, 107, 0.16);
        color: #fffad0;
        font-weight: 800;
      }

      .multiplayer-status {
        min-height: 18px;
        color: rgba(245, 241, 212, 0.7);
        font-size: 12px;
        line-height: 1.4;
      }

      .mini-button {
        min-width: 44px;
        min-height: 34px;
        border: 1px solid rgba(245, 241, 212, 0.22);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #fffad0;
        font-weight: 700;
      }

      .mini-button.danger {
        border-color: rgba(255, 106, 106, 0.38);
        color: #ffb3a8;
      }

      #hud {
        position: fixed;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      #topBar {
        position: absolute;
        top: max(12px, env(safe-area-inset-top));
        left: 12px;
        right: 12px;
        display: flex;
        gap: 10px;
        align-items: flex-start;
        justify-content: space-between;
      }

      .panel {
        min-width: 118px;
        padding: 10px 12px;
        border: 1px solid rgba(245, 241, 212, 0.16);
        border-radius: 14px;
        background: rgba(9, 9, 7, 0.48);
        color: rgba(245, 241, 212, 0.9);
        text-shadow: 0 1px 2px #000;
        backdrop-filter: blur(6px);
      }

      .panel b {
        color: #fff7b0;
      }

      .meter {
        width: 100%;
        height: 7px;
        margin-top: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
      }

      .meter > span {
        display: block;
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #ffec87, #78f3ff);
        transition: width 0.16s linear;
      }

      #objective {
        max-width: min(56vw, 380px);
        text-align: right;
        font-size: 13px;
        line-height: 1.45;
      }

      #exitPointer {
        position: fixed;
        top: max(86px, calc(env(safe-area-inset-top) + 78px));
        right: max(12px, env(safe-area-inset-right));
        z-index: 6;
        min-width: 108px;
        min-height: 58px;
        padding: 8px 10px;
        border-radius: 16px;
        display: none;
        grid-template-columns: 34px 1fr;
        gap: 8px;
        align-items: center;
        background: rgba(12, 11, 8, 0.72);
        border: 1px solid rgba(255, 247, 174, 0.35);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
        pointer-events: none;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      #exitPointer.visible {
        display: grid;
      }

      #exitPointerArrow {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        color: #ffe36b;
        filter: drop-shadow(0 0 5px rgba(255, 227, 107, 0.45));
      }

      #exitPointerArrow svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .exit-pointer-meta {
        display: grid;
        gap: 2px;
        text-align: left;
        text-shadow: 0 1px 2px #000;
      }

      #exitPointerText {
        color: #fff7ae;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
      }

      #exitPointerDistance {
        color: rgba(245, 241, 212, 0.72);
        font-size: 11px;
        line-height: 1.2;
        white-space: nowrap;
      }

      #reticle {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        margin: -9px 0 0 -9px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 50%;
        opacity: 0.8;
      }

      #reticle::before,
      #reticle::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.55);
      }

      #reticle::before {
        left: 8px;
        top: -7px;
        width: 1px;
        height: 30px;
      }

      #reticle::after {
        left: -7px;
        top: 8px;
        width: 30px;
        height: 1px;
      }

      #prompt {
        position: absolute;
        left: 50%;
        bottom: 24%;
        min-width: 170px;
        max-width: 72vw;
        transform: translateX(-50%);
        padding: 9px 13px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.56);
        color: #fff8bc;
        text-align: center;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.18s;
      }

      #prompt.visible {
        opacity: 1;
      }

      #joystick {
        position: absolute;
        left: max(18px, env(safe-area-inset-left));
        bottom: max(26px, env(safe-area-inset-bottom));
        width: 126px;
        height: 126px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        pointer-events: auto;
      }

      #stick {
        position: absolute;
        left: 38px;
        top: 38px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(255, 248, 190, 0.34);
        border: 1px solid rgba(255, 255, 255, 0.24);
        box-shadow: 0 0 18px rgba(255, 248, 190, 0.2);
      }

      #actions {
        position: absolute;
        right: max(10px, env(safe-area-inset-right));
        bottom: max(18px, env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(4, 56px);
        gap: 8px;
        pointer-events: auto;
      }

      .hud-tool-btn {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 18px;
        background: rgba(17, 17, 14, 0.78);
        color: #fffad0;
        backdrop-filter: blur(6px);
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      .hud-tool-btn svg {
        width: 26px;
        height: 26px;
        display: block;
      }

      .hud-tool-btn.active {
        background: rgba(240, 217, 107, 0.88);
        color: #171307;
        border-color: rgba(240, 217, 107, 0.45);
        box-shadow: 0 0 18px rgba(240, 217, 107, 0.28);
      }

      .hud-tool-btn.pose-menu-open:not(.active) {
        border-color: rgba(240, 217, 107, 0.45);
        background: rgba(240, 217, 107, 0.14);
      }

      .round-button {
        width: 64px;
        height: 64px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 22px;
        background: rgba(17, 17, 14, 0.72);
        color: #fffad0;
        font-weight: 800;
        font-size: 20px;
        backdrop-filter: blur(6px);
      }

      .round-button.active {
        background: rgba(240, 217, 107, 0.88);
        color: #171307;
        box-shadow: 0 0 20px rgba(240, 217, 107, 0.3);
      }

      #posePanel {
        display: none;
        position: absolute;
        right: max(10px, env(safe-area-inset-right));
        bottom: max(86px, calc(env(safe-area-inset-bottom) + 68px));
        z-index: 6;
        width: min(200px, 46vw);
        padding: 8px 10px 10px;
        border-radius: 16px;
        border: 1px solid rgba(245, 241, 212, 0.2);
        background: rgba(12, 11, 8, 0.78);
        backdrop-filter: blur(8px);
        pointer-events: auto;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
      }

      #posePanel.collapsed {
        padding-bottom: 8px;
      }

      .pose-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      #posePanel.collapsed .pose-panel-header {
        margin-bottom: 0;
      }

      .pose-panel-title-icon {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.9;
      }

      .pose-panel-title-icon svg {
        width: 22px;
        height: 22px;
        color: rgba(255, 247, 174, 0.9);
      }

      .pose-collapse-btn {
        flex-shrink: 0;
        width: 34px;
        height: 34px;
        padding: 0;
        display: grid;
        place-items: center;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.1);
        color: #fffad0;
      }

      .pose-collapse-btn svg {
        width: 18px;
        height: 18px;
        transition: transform 0.2s ease;
      }

      #posePanel.collapsed .pose-collapse-btn svg {
        transform: rotate(180deg);
      }

      #posePanelBody {
        min-height: 0;
      }

      #posePanel.collapsed #posePanelBody {
        display: none;
      }

      .pose-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      #posePanelBody .pose-row + .pose-row {
        margin-top: 8px;
      }

      .pose-chip {
        min-width: 38px;
        width: 38px;
        height: 38px;
        padding: 0;
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        color: #fffad0;
      }

      .pose-chip svg {
        width: 22px;
        height: 22px;
        display: block;
      }

      .pose-chip.active {
        border-color: rgba(240, 217, 107, 0.55);
        background: rgba(240, 217, 107, 0.22);
        color: #fff7c8;
      }

      .pose-chip.pose-action-chip {
        transition:
          transform 0.1s ease,
          border-color 0.12s ease,
          background 0.12s ease;
      }

      .pose-chip.pose-action-chip:active:not(.action-fired) {
        transform: scale(0.92);
      }

      @keyframes pose-action-feedback {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(240, 217, 107, 0);
        }
        40% {
          transform: scale(1.12);
          border-color: rgba(240, 217, 107, 0.95);
          background: rgba(240, 217, 107, 0.45);
          color: #171307;
          box-shadow: 0 0 16px rgba(240, 217, 107, 0.5);
        }
        100% {
          transform: scale(1);
          border-color: rgba(255, 255, 255, 0.16);
          background: rgba(255, 255, 255, 0.08);
          color: #fffad0;
          box-shadow: none;
        }
      }

      .pose-chip.pose-action-chip.action-fired {
        animation: pose-action-feedback 0.42s ease-out;
      }

      #message {
        position: absolute;
        left: 50%;
        top: 18%;
        width: min(82vw, 420px);
        transform: translateX(-50%);
        padding: 12px 15px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.68);
        color: #fff8bc;
        text-align: center;
        line-height: 1.45;
        opacity: 0;
        transition: opacity 0.24s;
      }

      #message.visible {
        opacity: 1;
      }

      #damage {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
        background: radial-gradient(circle, transparent 28%, rgba(255, 0, 0, 0.4));
        opacity: 0;
        transition: opacity 0.18s;
      }

      #vignette {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        background:
          radial-gradient(circle at center, transparent 38%, rgba(0, 0, 0, 0.74)),
          linear-gradient(transparent, rgba(0, 0, 0, 0.18));
        opacity: 0.7;
      }

      #inventory,
      #settings,
      #keypad,
      #gameOver {
        position: fixed;
        inset: 0;
        z-index: 12;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.72);
        pointer-events: auto;
      }

      .modal {
        width: min(440px, 100%);
        max-height: 84vh;
        overflow: auto;
        padding: 18px;
        border: 1px solid rgba(245, 241, 212, 0.22);
        border-radius: 20px;
        background: rgba(18, 17, 12, 0.96);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
      }

      .modal h2 {
        margin: 0 0 10px;
        color: #fff7ae;
        font-size: 20px;
      }

      .modal p {
        color: rgba(245, 241, 212, 0.8);
        line-height: 1.55;
      }

      .item-card {
        padding: 12px;
        margin: 9px 0;
        border: 1px solid rgba(245, 241, 212, 0.15);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.06);
      }

      .item-card strong {
        display: block;
        color: #fff7ae;
        margin-bottom: 5px;
      }

      .modal-row {
        display: flex;
        gap: 10px;
      }

      .settings-action-row {
        margin-top: 14px;
      }

      .teammate-outline-settings {
        margin: 8px 0 10px;
        padding: 12px;
        border: 1px solid rgba(84, 164, 255, 0.35);
        border-radius: 12px;
        background: rgba(26, 49, 78, 0.35);
      }

      .teammate-outline-settings h3 {
        margin: 0 0 10px;
        color: #a8d1ff;
        font-size: 15px;
      }

      .teammate-outline-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 8px;
        color: rgba(236, 246, 255, 0.9);
        font-size: 13px;
      }

      .teammate-outline-row input[type="number"] {
        width: 92px;
        min-height: 34px;
        padding: 0 8px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.28);
        color: #fff;
      }

      .teammate-outline-row input[type="range"] {
        width: 130px;
      }

      .secondary-button {
        flex: 1;
        min-height: 46px;
        border: 1px solid rgba(245, 241, 212, 0.22);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        color: #fffad0;
        font-weight: 700;
      }

      #codeDisplay {
        height: 46px;
        margin: 12px 0;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.36);
        color: #fff7ae;
        display: grid;
        place-items: center;
        font-size: 24px;
        letter-spacing: 0.35em;
        font-weight: 800;
      }

      #keys {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      #keys button {
        min-height: 54px;
        border: 0;
        border-radius: 14px;
        background: rgba(245, 241, 212, 0.12);
        color: #fffad0;
        font-size: 20px;
        font-weight: 800;
      }

      @media (orientation: landscape) {
        #joystick {
          width: 112px;
          height: 112px;
        }

        #stick {
          left: 33px;
          top: 33px;
          width: 46px;
          height: 46px;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="boot-card">
        <h1>后室：潮湿灯影</h1>
        <p>手机端 Three.js 第一人称生存探索原型。左侧摇杆移动，右侧滑动视角，靠近物品后点击屏幕交互。</p>
        <p>目标：收集三张线索，得到密码，找到发光出口门。手电能驱散笑魇，但电量有限。</p>
        <div class="multiplayer-box">
          <label for="roomInput">联机房间（双方输入同一个房间号即可同步位置、视角和手电）</label>
          <input id="roomInput" maxlength="8" autocomplete="off" inputmode="latin" placeholder="ROOM01" />
          <div class="multiplayer-actions">
            <button id="createRoomButton" type="button">创建房间</button>
            <button id="joinRoomButton" type="button">加入房间</button>
          </div>
          <div id="networkStatus" class="multiplayer-status">未联机</div>
        </div>
        <button id="startButton">新增存档并进入</button>
        <div id="bootSaveList" class="save-list"></div>
      </div>
    </div>

    <div id="vignette"></div>
    <div id="damage"></div>

    <div id="hud">
      <div id="topBar">
        <div class="panel">
          <div>Level <b id="levelLabel">0</b></div>
          <div>手电 <b id="batteryLabel">100%</b></div>
          <div class="meter"><span id="batteryMeter"></span></div>
          <div>恐惧 <b id="fearLabel">0%</b></div>
          <div class="meter"><span id="fearMeter"></span></div>
          <div id="onlineStatus" class="multiplayer-status">未联机</div>
        </div>
        <div id="objective" class="panel">收集线索，找到出口。</div>
      </div>
      <div id="exitPointer" role="img" aria-label="出口方向">
        <div id="exitPointerArrow">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 3l7 8h-4v10H9V11H5l7-8z" />
          </svg>
        </div>
        <div class="exit-pointer-meta">
          <div id="exitPointerText">出口</div>
          <div id="exitPointerDistance">--m</div>
        </div>
      </div>
      <div id="reticle"></div>
      <div id="prompt"></div>
      <div id="message"></div>
      <div id="joystick"><div id="stick"></div></div>
      <div id="actions">
        <button type="button" id="flashlightButton" class="hud-tool-btn active" aria-label="手电">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 2v3M8.5 8.5 6 6M15.5 8.5 18 6" />
            <path d="M12 18a4 4 0 004-4V9a4 4 0 00-8 0v5a4 4 0 004 4z" />
            <path d="M9 22h6" />
          </svg>
        </button>

        function randomHash(x, z, salt = 0) {
          const n = Math.sin((x * 127.1 + z * 311.7 + salt * 74.7) * 12.9898) * 43758.5453;
          return n - Math.floor(n);
        }

        function randomChoice(list, x, z, salt) {
          return list[Math.floor(randomHash(x, z, salt) * list.length) % list.length];

        function getDirectionTextFromAngle(angle) {
          const abs = Math.abs(angle);
          if (abs < 0.35) return "前方";
          if (abs < 1.15) return angle > 0 ? "右前" : "左前";
          if (abs < 2.0) return angle > 0 ? "右侧" : "左侧";
          if (abs < 2.75) return angle > 0 ? "右后" : "左后";
          return "后方";
        }

        function updateExitPointer() {
          if (!ui.exitPointer || !ui.exitPointerArrow) {
            return;
          }
          if (!state.started || state.dead || state.won) {
            ui.exitPointer.classList.remove("visible");
            return;
          }
          const ex = getExitDoorWorldXZ();
          const dx = ex.x - state.position.x;
          const dz = ex.z - state.position.z;
          const distance = Math.hypot(dx, dz);
          let rel = Math.atan2(dx, -dz) - state.yaw;
          rel = Math.atan2(Math.sin(rel), Math.cos(rel));
          if (state.exitPointerAngleSmooth === null || Number.isNaN(state.exitPointerAngleSmooth)) {
            state.exitPointerAngleSmooth = rel;
          } else {
            let delta = rel - state.exitPointerAngleSmooth;
            delta = Math.atan2(Math.sin(delta), Math.cos(delta));
            state.exitPointerAngleSmooth += delta * 0.22;
            state.exitPointerAngleSmooth = Math.atan2(
              Math.sin(state.exitPointerAngleSmooth),
              Math.cos(state.exitPointerAngleSmooth),
            );
          }
          ui.exitPointerArrow.style.transform = "rotate(" + state.exitPointerAngleSmooth + "rad)";
          const direction = getDirectionTextFromAngle(rel);
          if (ui.exitPointerText) {
            ui.exitPointerText.textContent = direction;
          }
          if (ui.exitPointerDistance) {
            ui.exitPointerDistance.textContent = "出口 " + Math.max(1, Math.round(distance)) + "m";

          ui.exitPointer.setAttribute("aria-label", "出口在" + direction + "，距离约 " + Math.round(distance) + " 米");
          ui.exitPointer.classList.add("visible");

        function createCanvasTexture(draw) {
          const canvas = document.createElement("canvas");
          canvas.width = 128;
          canvas.height = 128;
          const ctx = canvas.getContext("2d");
          draw(ctx, canvas);
          const texture = new THREE.CanvasTexture(canvas);
          texture.magFilter = THREE.NearestFilter;
          texture.minFilter = THREE.LinearMipMapLinearFilter;
          return texture;
        }

        const wallpaperTexture = createCanvasTexture((ctx, canvas) => {
          ctx.fillStyle = "#eee49b";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.strokeStyle = "rgba(140, 112, 42, 0.35)";
          ctx.lineWidth = 2;
          for (let x = 10; x < canvas.width; x += 18) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            for (let y = 0; y < canvas.height; y += 16) {
              ctx.quadraticCurveTo(x + 8, y + 8, x, y + 16);
            }
            ctx.stroke();
          }
          for (let y = 12; y < canvas.height; y += 28) {
            ctx.fillStyle = "rgba(95, 74, 28, 0.12)";
            ctx.fillRect(0, y, canvas.width, 2);
          }
        });

        const carpetTexture = createCanvasTexture((ctx, canvas) => {
          ctx.fillStyle = "#6f5b45";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < 500; i += 1) {
            const light = 70 + Math.floor(Math.random() * 35);
            ctx.fillStyle = "rgba(" + light + "," + (light - 12) + "," + (light - 24) + ",0.24)";
            ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1, 1);
          }
        });

        function makeMaterial(color, texture) {
          return new THREE.MeshLambertMaterial({
            color,
            map: texture || null,
          });
        }

        function disposeObject(object) {
          object.traverse((child) => {
            if (child.geometry) {
              child.geometry.dispose();
            }
            if (child.material) {
              if (Array.isArray(child.material)) {
                child.material.forEach((material) => material.dispose());
              } else {
                child.material.dispose();
              }
            }
          });
        }

          entities.forEach((entity) => {
            scene.remove(entity.object);
            disposeObject(entity.object);
          });
          entities.length = 0;
          placedGlowMarks.forEach((mark) => {
            scene.remove(mark);
            disposeObject(mark);
          });
          placedGlowMarks.length = 0;
        }

        function createRemotePlayer() {
          const group = new THREE.Group();
          const jacket = makeMaterial(0x2d3a4d);
          const trim = makeMaterial(0x1a2230);
          const skin = makeMaterial(0xe8c4a8);
          const dark = makeMaterial(0x15151c);

          const torso = new THREE.Mesh(new THREE.BoxBufferGeometry(0.52, 0.62, 0.28), jacket);
          torso.position.set(0, 1.02, 0);
          const belt = new THREE.Mesh(new THREE.BoxBufferGeometry(0.54, 0.08, 0.3), trim);
          belt.position.set(0, 0.68, 0.01);
          torso.add(belt);

          const legGeo = new THREE.BoxBufferGeometry(0.2, 0.44, 0.22);
          const legs = new THREE.Group();
          legs.position.set(0, 0.26, 0);
          const legL = new THREE.Mesh(legGeo, trim);
          legL.position.set(-0.14, 0.28, 0);
          const legR = new THREE.Mesh(legGeo, trim);
          legR.position.set(0.14, 0.28, 0);
          legs.add(legL, legR);

          const headGroup = new THREE.Group();
          headGroup.position.set(0, 1.48, 0);

          const headSkin = new THREE.Mesh(new THREE.SphereBufferGeometry(0.235, 14, 14), skin);
          const hair = new THREE.Mesh(new THREE.SphereBufferGeometry(0.24, 10, 8), trim);
          hair.position.set(0, 0.14, -0.03);
          hair.scale.set(1.05, 0.48, 1.05);

          const brow = new THREE.Mesh(new THREE.BoxBufferGeometry(0.17, 0.038, 0.038), dark);
          brow.position.set(0, 0.11, -0.178);

          const eyeGeo = new THREE.SphereBufferGeometry(0.046, 8, 8);
          const eyeL = new THREE.Mesh(eyeGeo, dark);
          eyeL.position.set(-0.072, 0.032, -0.196);
          const eyeR = new THREE.Mesh(eyeGeo, dark);
          eyeR.position.set(0.072, 0.032, -0.196);

          const mouth = new THREE.Mesh(new THREE.BoxBufferGeometry(0.1, 0.042, 0.028), dark);
          mouth.position.set(0, -0.048, -0.2);

          headGroup.add(headSkin, hair, brow, eyeL, eyeR, mouth);

          const shoulderY = 1.22;
          const armGeo = new THREE.CylinderBufferGeometry(0.084, 0.076, 0.52, 8);
          const armL = new THREE.Group();
          armL.position.set(-0.4, shoulderY, 0);
          const armLMesh = new THREE.Mesh(armGeo, jacket);
          armLMesh.position.set(0, -0.26, 0);
          armL.add(armLMesh);

          const armR = new THREE.Group();
          armR.position.set(0.4, shoulderY, 0);
          const armRMesh = new THREE.Mesh(armGeo, jacket);
          armRMesh.position.set(0, -0.26, 0);
          armR.add(armRMesh);

          const lampMat = makeMaterial(0xfff3bd);
          const lamp = new THREE.Mesh(new THREE.BoxBufferGeometry(0.16, 0.11, 0.22), lampMat);
          lamp.position.set(0.46, 1.08, -0.1);
          lamp.rotation.set(0.22, 0, -0.18);

          const beam = new THREE.SpotLight(0xfff3bd, 1.35, 12, Math.PI / 8, 0.65, 1.55);
          beam.position.set(0.42, 1.1, -0.16);
          beam.target.position.set(2, 0.9, -6);

          const outlineMaterial = new THREE.MeshBasicMaterial({
            color: 0x4ea3ff,
            transparent: true,
            opacity: clamp(state.allyOutlineOpacity, 0.1, 1),
            depthTest: false,
            depthWrite: false,
            side: THREE.DoubleSide,
          });
          const outlineMesh = new THREE.Mesh(new THREE.CylinderBufferGeometry(0.54, 0.44, 1.96, 16, 1, true), outlineMaterial);
          outlineMesh.position.set(0, 1.02, 0);
          outlineMesh.renderOrder = 999;
          outlineMesh.visible = false;

          group.add(torso, legs, headGroup, armL, armR, lamp, beam, beam.target, outlineMesh);
          scene.add(group);

          return {
            group,
            beam,
            lamp,
            torso,
            headGroup,
            armL,
            armR,
            face: { brow, eyeL, eyeR, mouth },
            expressionId: "neutral",
            actionId: "",
            actionStartedAt: 0,
            idlePhase: Math.random() * Math.PI * 2,
            lastSeen: performance.now(),
            outline: outlineMesh,
          };
        }

        function removeRemotePlayer(id) {
          const remote = network.remotePlayers.get(id);
          if (!remote) {
            return;
          }
          scene.remove(remote.group);
          disposeObject(remote.group);
          network.remotePlayers.delete(id);
        }

        function clearRemotePlayers() {
          Array.from(network.remotePlayers.keys()).forEach(removeRemotePlayer);
        }

        function normalizeExpressionId(value) {
          const id = String(value || "").toLowerCase();
          return EXPRESSION_IDS.includes(id) ? id : "neutral";
        }

        function normalizeActionId(value) {
          const id = String(value || "").toLowerCase();
          return ACTION_IDS.includes(id) ? id : "";
        }

        function applyRemoteExpression(remote, expressionId) {
          const face = remote.face;
          if (!face) {
            return;
          }
          const { brow, eyeL, eyeR, mouth } = face;
          brow.rotation.set(0, 0, 0);
          brow.position.set(0, 0.11, -0.178);
          eyeL.position.set(-0.072, 0.032, -0.196);
          eyeR.position.set(0.072, 0.032, -0.196);
          eyeL.scale.set(1, 1, 1);
          eyeR.scale.set(1, 1, 1);
          mouth.scale.set(1, 1, 1);
          mouth.position.set(0, -0.048, -0.2);
          mouth.rotation.z = 0;

          const expr = normalizeExpressionId(expressionId);
          remote.expressionId = expr;
          if (expr === "smile") {
            mouth.scale.set(1.35, 0.42, 1);
            mouth.position.y = -0.04;
            eyeL.scale.set(1, 0.62, 1);
            eyeR.scale.set(1, 0.62, 1);
          } else if (expr === "scared") {
            mouth.scale.set(0.65, 1.3, 1);
            eyeL.scale.set(1, 1.22, 1);
            eyeR.scale.set(1, 1.22, 1);
            brow.position.y = 0.125;
            brow.rotation.z = 0.14;
          } else if (expr === "focus") {
            brow.rotation.z = -0.16;
            mouth.scale.set(0.88, 0.65, 1);
            eyeL.position.z = -0.202;
            eyeR.position.z = -0.202;
          } else if (expr === "tired") {
            eyeL.scale.set(1, 0.32, 1);
            eyeR.scale.set(1, 0.32, 1);
            mouth.scale.set(1.05, 0.32, 1);
            brow.rotation.z = 0.08;
          }
        }

        function updateRemoteActionAnimation(remote) {
          const armL = remote.armL;
          const armR = remote.armR;
          const headG = remote.headGroup;
          if (!armL || !armR || !headG) {
            return;
          }
          armL.rotation.set(0, 0, 0.06);
          armR.rotation.set(0, 0, -0.06);
          armL.rotation.x = 0;
          headG.rotation.x = 0;
          headG.rotation.y = 0;

          const act = remote.actionId;
          const start = remote.actionStartedAt;
          if (!act || !start) {
            return;
          }
          const dur = (ACTION_DURATIONS[act] || 1) * 1000;
          const elapsed = Date.now() - start;
          if (elapsed < 0 || elapsed > dur) {
            return;
          }

          if (act === "wave") {
            armR.rotation.z = -0.06 + Math.sin(elapsed * 0.011) * 1.05;
          } else if (act === "nod") {
            headG.rotation.x = Math.sin(elapsed * 0.021) * 0.44;
          } else if (act === "point") {
            const ease = Math.min(1, elapsed / 320);
            armL.rotation.x = -1.05 * ease;
            armL.rotation.z = 0.12 + ease * 0.28;
          } else if (act === "shrug") {
            const u = Math.sin(Math.PI * Math.min(1, elapsed / dur));
            armL.rotation.z = 0.06 - u * 0.72;
            armR.rotation.z = -0.06 + u * 0.72;
          }
        }

        function updateRemoteAvatarsAnimation(elapsedTime) {
          network.remotePlayers.forEach((remote) => {
            if (!remote.group.parent || !remote.group.visible) {
              return;
            }
            if (remote.torso) {
              remote.torso.scale.y = 1 + Math.sin(elapsedTime * 1.85 + remote.idlePhase) * 0.014;
            }
            applyRemoteExpression(remote, remote.expressionId);
            updateRemoteActionAnimation(remote);
            const headG = remote.headGroup;
            if (headG) {
              const act = remote.actionId;
              const start = remote.actionStartedAt;
              const dur = act ? (ACTION_DURATIONS[act] || 1) * 1000 : 0;
              const inNod = act === "nod" && start && Date.now() - start <= dur;
              if (!inNod) {
                headG.rotation.y = Math.sin(elapsedTime * 0.62 + remote.idlePhase) * 0.045;
              }
            }
          });
        }

        function updateRemotePlayer(id, data) {
          if (!scene || !data || !Number.isFinite(Number(data.x)) || !Number.isFinite(Number(data.z))) {
            return;
          }
          let remote = network.remotePlayers.get(id);
          if (!remote) {
            remote = createRemotePlayer();
            network.remotePlayers.set(id, remote);
          }
          remote.lastSeen = performance.now();
          remote.group.position.set(Number(data.x), 0, Number(data.z));
          remote.group.rotation.y = Number(data.yaw) || 0;
          remote.group.visible = Number(data.levelIndex) === state.levelIndex;
          const pitch = clamp(Number(data.pitch) || 0, -Math.PI / 3, Math.PI / 3);
          remote.beam.target.position.set(
            0.35 + Math.sin(pitch) * 0.4,
            1.05 + Math.sin(pitch) * 3.2,
            -Math.cos(pitch) * 5.5,
          );
          remote.beam.visible = Boolean(data.flashlightOn) && remote.group.visible;
          remote.lamp.visible = remote.beam.visible;

          remote.expressionId = normalizeExpressionId(data.expression);
          const nextAction = normalizeActionId(data.action);
          const nextAt = Number(data.actionAt) || 0;
          if (nextAction !== remote.actionId || nextAt !== remote.actionStartedAt) {
            remote.actionId = nextAction;
            remote.actionStartedAt = nextAt;
          }
          updateRemoteOutline(remote);
        }

        function updateRemoteOutline(remote) {
          if (!remote || !remote.outline) {
            return;
          }
          const sameLevelVisible = Boolean(remote.group && remote.group.visible);
          if (!sameLevelVisible || !state.allyOutlineEnabled) {
            remote.outline.visible = false;
            return;
          }
          const dx = remote.group.position.x - state.position.x;
          const dz = remote.group.position.z - state.position.z;
          const distance = Math.hypot(dx, dz);
          const maxDistance = clamp(Number(state.allyOutlineDistance) || 28, 3, 80);
          remote.outline.visible = distance <= maxDistance;
          remote.outline.material.opacity = clamp(Number(state.allyOutlineOpacity) || 0.45, 0.1, 1);
        }

        function refreshRemoteOutlines() {
          network.remotePlayers.forEach((remote) => {
            updateRemoteOutline(remote);
          });
        }

        function cleanupRemotePlayers() {
          const now = performance.now();
          network.remotePlayers.forEach((remote, id) => {
            remote.group.visible = remote.group.visible && now - remote.lastSeen < 5000;
            if (now - remote.lastSeen > 15000) {
              removeRemotePlayer(id);
            }
          });
        }

        function addBlocker(mesh) {
          const box = new THREE.Box3().setFromObject(mesh);
          blockers.push({ box, mesh });
        }

        function makeBox(group, width, height, depth, x, y, z, material) {
          const mesh = new THREE.Mesh(new THREE.BoxBufferGeometry(width, height, depth), material);
          mesh.position.set(x, y, z);
          group.add(mesh);
          return mesh;
        }

        function addWall(group, x, z, width, depth, material) {
          const wall = makeBox(group, width, 3.2, depth, x, 1.6, z, material);
          addBlocker(wall);
        }

        function addDoorTrim(group, x, z, width, depth) {
          const trim = makeBox(group, width, 0.06, depth, x, 2.72, z, makeMaterial(0x2b2618));
          trim.material.transparent = true;
          trim.material.opacity = 0.65;
        }

        function addCell(cx, cz) {
          const key = cellKey(cx, cz);
          if (generatedCells.has(key)) {
            return;
          }

          const level = currentLevel();
          const group = new THREE.Group();
          group.position.set(cx * CELL_SIZE, 0, cz * CELL_SIZE);
          scene.add(group);

          const isLevel0 = state.levelIndex === 0;
          const wallMaterial = makeMaterial(level.wall, isLevel0 ? wallpaperTexture : null);
          const floorMaterial = makeMaterial(level.floor, isLevel0 ? carpetTexture : null);
          const ceilingMaterial = makeMaterial(level.ceiling);
          const propMaterial = makeMaterial(
            state.levelIndex === 0 ? 0x7d694c : state.levelIndex === 1 ? 0x151515 : 0x777b7f,
          );
          const floor = makeBox(group, CELL_SIZE, 0.12, CELL_SIZE, 0, -0.06, 0, floorMaterial);
          const ceiling = makeBox(group, CELL_SIZE, 0.12, CELL_SIZE, 0, 3.24, 0, ceilingMaterial);
          floor.receiveShadow = true;
          ceiling.receiveShadow = true;

          const openNorth = cz === 0 || randomHash(cx, cz, 1) > 0.26;
          const openSouth = cz === 0 || randomHash(cx, cz - 1, 1) > 0.26;
          const openEast = cx === 0 || randomHash(cx, cz, 2) > 0.26;
          const openWest = cx === 0 || randomHash(cx - 1, cz, 2) > 0.26;
          const wallThickness = 0.35;
          const side = CELL_SIZE / 2;

          if (openNorth) {
            addWall(group, -3.7, -side, 4.6, wallThickness, wallMaterial);
            addWall(group, 3.7, -side, 4.6, wallThickness, wallMaterial);
            addDoorTrim(group, 2.25, -side + 0.02, 0.16, 0.08);
            addDoorTrim(group, -2.25, -side + 0.02, 0.16, 0.08);
          } else {
            addWall(group, 0, -side, CELL_SIZE, wallThickness, wallMaterial);
          }
          if (openSouth) {
            addWall(group, -3.7, side, 4.6, wallThickness, wallMaterial);
            addWall(group, 3.7, side, 4.6, wallThickness, wallMaterial);
            addDoorTrim(group, 2.25, side - 0.02, 0.16, 0.08);
            addDoorTrim(group, -2.25, side - 0.02, 0.16, 0.08);
          } else {
            addWall(group, 0, side, CELL_SIZE, wallThickness, wallMaterial);
          }
          if (openEast) {
            addWall(group, side, -3.7, wallThickness, 4.6, wallMaterial);
            addWall(group, side, 3.7, wallThickness, 4.6, wallMaterial);
            addDoorTrim(group, side - 0.02, 2.25, 0.08, 0.16);
            addDoorTrim(group, side - 0.02, -2.25, 0.08, 0.16);
          } else {
            addWall(group, side, 0, wallThickness, CELL_SIZE, wallMaterial);
          }
          if (openWest) {
            addWall(group, -side, -3.7, wallThickness, 4.6, wallMaterial);
            addWall(group, -side, 3.7, wallThickness, 4.6, wallMaterial);
            addDoorTrim(group, -side + 0.02, 2.25, 0.08, 0.16);
            addDoorTrim(group, -side + 0.02, -2.25, 0.08, 0.16);
          } else {
            addWall(group, -side, 0, wallThickness, CELL_SIZE, wallMaterial);
          }

          addLights(group, cx, cz, level);
          addProps(group, cx, cz, propMaterial);
          addFixedInteractables(group, cx, cz);
          addRandomPickups(group, cx, cz);
          addBirthDirectionArrows(group, cx, cz);

          generatedCells.set(key, { group, cx, cz });
        }

        function addLights(group, cx, cz, level) {
          const baseColor = level.light;
          for (let i = 0; i < 2; i += 1) {
            const x = i === 0 ? -2.8 : 2.8;
            const fixture = makeBox(group, 2.1, 0.08, 0.32, x, 3.08, 0, makeMaterial(0xffffee));
            const light = new THREE.PointLight(baseColor, 0.55, 10, 1.6);
            light.position.set(x, 2.86, 0);
            light.userData.flickerSeed = randomHash(cx, cz, i + 5) * 100;
            group.add(light);
            fixture.userData.light = light;
          }
        }

        function addProps(group, cx, cz, material) {
          const roll = randomHash(cx, cz, 9);
          if (Math.abs(cx) + Math.abs(cz) < 2 || roll < 0.38) {
            return;
          }

          if (state.levelIndex === 0) {
            const box = makeBox(
              group,
              1.1,
              0.9,
              1.1,
              randomChoice([-3.2, 3.2], cx, cz, 10),
              0.45,
              randomChoice([-2.8, 2.8], cx, cz, 11),
              material,
            );
            box.rotation.y = randomHash(cx, cz, 12) * Math.PI;
            addBlocker(box);
          } else if (state.levelIndex === 1) {
            const desk = makeBox(
              group,
              2.2,
              0.8,
              1.1,
              randomChoice([-2.7, 2.7], cx, cz, 10),
              0.4,
              randomChoice([-2.6, 2.6], cx, cz, 11),
              material,
            );
            const top = makeBox(group, 2.6, 0.16, 1.4, desk.position.x, 0.88, desk.position.z, material);
            desk.rotation.y = randomHash(cx, cz, 12) * Math.PI;
            top.rotation.y = desk.rotation.y;
            addBlocker(desk);
            addBlocker(top);
          } else {
            const pipeMaterial = makeMaterial(0x777b7f);
            const pipe = new THREE.Mesh(new THREE.CylinderBufferGeometry(0.18, 0.18, 6, 8), pipeMaterial);
            pipe.position.set(0, 2.35, randomChoice([-3, 3], cx, cz, 13));
            pipe.rotation.z = Math.PI / 2;
            group.add(pipe);
          }
        }

        function addBirthDirectionArrows(group, cx, cz) {
          if (cx !== 0 || cz !== 0) {
            return;
          }
          if (state.levelIndex !== 0 && state.levelIndex !== 1 && state.levelIndex !== 2) {
            return;
          }
          const arrowMaterial = new THREE.MeshBasicMaterial({
            color: 0xffe36b,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
          });
          const birthOffsets = [
            { px: -2.6, pz: 0.4 },
            { px: 0, pz: 2.8 },
            { px: 2.6, pz: 0.4 },
          ];
          const slots = state.levelIndex === 0 ? LEVEL_ZERO_NOTE_SLOTS : LEVEL_ONE_TWO_NOTE_SLOTS;
          slots.forEach((slot, index) => {
            const target = noteSlotWorldXZ(slot);
            const off = birthOffsets[index];
            addGuideArrowToward(group, off.px, off.pz, target.x, target.z, arrowMaterial);
          });
        }

        function addGuideArrowToward(group, localX, localZ, worldTargetX, worldTargetZ, material, scale = 1) {
          const shape = new THREE.Shape();
          shape.moveTo(0, 0.58);
          shape.lineTo(0.34, -0.08);
          shape.lineTo(0.13, -0.08);
          shape.lineTo(0.13, -0.54);
          shape.lineTo(-0.13, -0.54);
          shape.lineTo(-0.13, -0.08);
          shape.lineTo(-0.34, -0.08);
          shape.lineTo(0, 0.58);
          const arrow = new THREE.Mesh(new THREE.ShapeBufferGeometry(shape), material);
          arrow.position.set(localX, 0.02, localZ);
          arrow.scale.setScalar(scale);
          arrow.rotation.order = "YXZ";
          arrow.rotation.x = -Math.PI / 2;
          const dx = worldTargetX - group.position.x - localX;
          const dz = worldTargetZ - group.position.z - localZ;
          arrow.rotation.y = Math.atan2(dx, dz);
          group.add(arrow);

          const glow = new THREE.Mesh(
            new THREE.RingBufferGeometry(0.48, 0.55, 24),
            new THREE.MeshBasicMaterial({ color: 0xffef9b, transparent: true, opacity: 0.26, side: THREE.DoubleSide }),
          );
          glow.position.set(localX, 0.016, localZ);
          glow.scale.setScalar(scale);
          glow.rotation.x = -Math.PI / 2;
          group.add(glow);
        }

        function addFixedInteractables(group, cx, cz) {
          const noteSlots =
            state.levelIndex === 0
              ? LEVEL_ZERO_NOTE_SLOTS
              : [
                  { x: 1, z: 0, note: 0, px: 0, pz: 0 },
                  { x: -2, z: 1, note: 1, px: 0, pz: 0 },
                  { x: 2, z: -2, note: 2, px: 0, pz: 0 },
                ];
          noteSlots.forEach((slot) => {
            if (cx === slot.x && cz === slot.z) {
              addPickup(
                group,
                "note-" + state.levelIndex + "-" + slot.note,
                "note",
                "发光线索纸条",
                currentLevel().notes[slot.note],
                slot.px,
                0.78,
                slot.pz,
              );
            }
          });

          if (cx === -1 && cz === 2) {
            addLocker(group, -2.8, 0, "locker-a");
          }
          if (cx === 2 && cz === 2) {
            addLocker(group, 2.8, 0, "locker-b");
          }
          if (cx === 3 && cz === -1) {
            addBattery(group, 0, 0.72, -1.5);
          }
          if (cx === -3 && cz === 1) {
            addMedkit(group, 1.8, 0.55, 1.2);
          }
          if (state.levelIndex >= 1) {
            if (cx === 0 && cz === 1) {
              addSedative(group, -1.8, 0.55, 1.4);
            }
            if (cx === 1 && cz === -1) {
              addGlowPowder(group, 1.8, 0.55, -1.6);
            }
          }
          if (state.levelIndex >= 1 && cx === -2 && cz === 2) {
            addFakeExitDoor(group);
          }
          const exitCell = state.levelIndex === 0 ? { x: 1, z: 1 } : { x: 3, z: 3 };
          if (cx === exitCell.x && cz === exitCell.z) {
            addExitDoor(group);
          }
        }

        function addRandomPickups(group, cx, cz) {
          if (Math.abs(cx) + Math.abs(cz) < 2) {
            return;
          }
          if (randomHash(cx, cz, 20) > 0.92) {
            addBattery(group, randomChoice([-2.4, 2.4], cx, cz, 21), 0.72, randomChoice([-1.8, 1.8], cx, cz, 22));
          }
          if (randomHash(cx, cz, 23) > 0.965) {
            addMedkit(group, randomChoice([-2.2, 2.2], cx, cz, 24), 0.55, randomChoice([-2.2, 2.2], cx, cz, 25));
          }
        }

        function addPickup(group, id, type, label, text, x, y, z) {
          if (state.collected.includes(id)) {
            return;
          }
          let mesh;
          if (type === "note") {
            mesh = new THREE.Mesh(new THREE.BoxBufferGeometry(0.84, 0.05, 0.6), makeMaterial(0xfff3a8));
            mesh.rotation.x = -Math.PI / 2;
            if (state.levelIndex === 0) {
              const marker = new THREE.PointLight(0xffef7d, 0.9, 5, 2);
              marker.position.set(x, y + 1.05, z);
              group.add(marker);
              const ring = new THREE.Mesh(
                new THREE.TorusBufferGeometry(0.46, 0.025, 8, 24),
                new THREE.MeshBasicMaterial({ color: 0xffef7d, transparent: true, opacity: 0.82 }),
              );
              ring.position.set(x, y + 0.08, z);
              ring.rotation.x = Math.PI / 2;
              group.add(ring);
              mesh.userData.extras = [marker, ring];
            }
          } else if (type === "battery") {
            mesh = new THREE.Mesh(new THREE.CylinderBufferGeometry(0.18, 0.18, 0.64, 12), makeMaterial(0x75f2ff));
            mesh.rotation.z = Math.PI / 2;
          } else if (type === "sedative") {
            mesh = new THREE.Mesh(new THREE.CylinderBufferGeometry(0.14, 0.14, 0.52, 12), makeMaterial(0x99f0ff));
            mesh.rotation.z = Math.PI / 2;
          } else if (type === "glowPowder") {

        function ensureWorldAroundPlayer() {
          const cx = Math.round(state.position.x / CELL_SIZE);
          const cz = Math.round(state.position.z / CELL_SIZE);
          for (let x = cx - ACTIVE_RADIUS; x <= cx + ACTIVE_RADIUS; x += 1) {
            for (let z = cz - ACTIVE_RADIUS; z <= cz + ACTIVE_RADIUS; z += 1) {
              addCell(x, z);
            }
          }

          generatedCells.forEach((cell, key) => {
            if (Math.abs(cell.cx - cx) > ACTIVE_RADIUS + 1 || Math.abs(cell.cz - cz) > ACTIVE_RADIUS + 1) {
              scene.remove(cell.group);
              disposeObject(cell.group);
              generatedCells.delete(key);
            }
          });

          for (let i = interactables.length - 1; i >= 0; i -= 1) {
            if (!interactables[i].parent) {
              interactables.splice(i, 1);
            }
          }
          for (let i = blockers.length - 1; i >= 0; i -= 1) {
            if (!blockers[i].mesh.parent) {
              blockers.splice(i, 1);
            }
          }
        }

        function buildEntities() {
          const level = currentLevel();
          for (let i = 0; i < level.smilers; i += 1) {
            spawnEntity("smiler", 16 + i * 8, -14 - i * 3, i);
          }
          for (let i = 0; i < level.partygoers; i += 1) {
            spawnEntity("partygoer", -18 - i * 6, 12 + i * 8, i);
          }
          for (let i = 0; i < level.skinStealers; i += 1) {
            spawnEntity("skin", 12 + i * 12, 18 - i * 8, i);
          }
          for (let i = 0; i < (level.moths || 0); i += 1) {
            spawnEntity("moth", 10 + i * 9, 10 + i * 4, i);
          }
          for (let i = 0; i < (level.listeners || 0); i += 1) {
            spawnEntity("listener", -14 - i * 7, -10 + i * 9, i);
          }
        }

        function spawnEntity(type, x, z, index) {
          const object =
            type === "smiler"
              ? createSmiler()
              : type === "partygoer"
                ? createPartygoer()
                : type === "skin"
                  ? createSkinStealer()
                  : type === "moth"
                    ? createLightMoth()
                    : createListener();
          object.position.set(x, type === "smiler" || type === "moth" ? 1.65 : 0, z);
          scene.add(object);
          entities.push({
            type,
            object,
            origin: new THREE.Vector3(x, 0, z),
            state: "patrol",
            speed:
              type === "smiler"
                ? 3.2
                : type === "partygoer"
                  ? 1.45
                  : type === "skin"
                    ? 2.6
                    : type === "moth"
                      ? 2.2
                      : 2.05,
            phase: index * 2.31,
            lastStepSound: 0,
            hidden: type === "skin",
          });
        }

        function createSmiler() {
          const texture = createCanvasTexture((ctx, canvas) => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.shadowColor = "#ffffff";
            ctx.shadowBlur = 18;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(42, 44, 9, 0, Math.PI * 2);
            ctx.arc(86, 44, 9, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(64, 62, 36, 0.15 * Math.PI, 0.85 * Math.PI);
            ctx.stroke();
          });
          const material = new THREE.SpriteMaterial({
            map: texture,
            color: 0xffffff,
            transparent: true,
            depthWrite: false,
          });
          const sprite = new THREE.Sprite(material);
          sprite.scale.set(2.2, 2.2, 2.2);
          return sprite;
        }
