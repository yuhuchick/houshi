        function resetLevel(keepLevel = true) {
          clearWorld();
          state.dead = false;
          state.paused = false;
          state.won = false;
          state.battery = 100;
          state.fear = 0;
          state.darkTime = 0;
          state.flashlightOn = true;
          state.hiddenUntil = 0;
          state.noiseLevel = 0;
          state.sedatedUntil = 0;
          state.glowPowder = 0;
          state.glowMarks = [];
          state.collected = [];
          state.noteIds = [];
          state.inputCode = "";
          state.position.set(0, PLAYER_HEIGHT, 0);
          state.velocity.set(0, 0, 0);
          state.yaw = 0;
          state.pitch = 0;
          state.playerExpression = "neutral";
          state.playerAction = "";
          state.playerActionAt = 0;
          state.exitPointerAngleSmooth = null;
          if (!keepLevel) {
            state.levelIndex = 0;
          }
          applyLevelStyle();
          ensureWorldAroundPlayer();
          buildEntities();
          rebuildGlowMarks();
          updateCamera();
          saveProgress(true);
          ui.gameOver.style.display = "none";
          ui.keypad.style.display = "none";
          syncPoseChipUi();
          updatePosePanelVisibility();
          sendNetworkState(true);
          showMessage(currentLevel().name + "：你在潮湿的地毯上醒来。");
        }

        function nextLevel() {
          if (state.levelIndex >= LEVELS.length - 1) {
            state.won = true;
            state.paused = true;
            showGameOver("你逃出了这片后室", "最后一道门后不是出口，而是一阵真实的风。恭喜通关。");
            deleteSaveSlot(state.activeSaveId, false);
            return;
          }
          state.levelIndex += 1;
          resetLevel(true);
        }

        function applyLevelStyle() {
          const level = currentLevel();
          scene.fog.color.setHex(level.fog);
          ambientLight.color.setHex(state.levelIndex === 0 ? 0x383326 : 0x242424);
          playerLight.color.setHex(state.levelIndex === 2 ? 0xffddd8 : 0xfff3bd);
          ui.objective.textContent = level.objective;
          ui.levelLabel.textContent = String(state.levelIndex);
        }

        function createProgressSnapshot() {
          normalizeInventoryState();
          return {
            levelIndex: state.levelIndex,
            battery: Math.round(state.battery),
            fear: Math.round(state.fear),
            collected: state.collected,
            noteIds: state.noteIds,
            glowPowder: state.glowPowder,
            glowMarks: state.glowMarks,
            position: {
              x: state.position.x,
              z: state.position.z,
            },
            yaw: state.yaw,
            pitch: state.pitch,
            flashlightOn: state.flashlightOn,
            allyOutlineEnabled: state.allyOutlineEnabled,
            allyOutlineDistance: state.allyOutlineDistance,
            allyOutlineOpacity: state.allyOutlineOpacity,
          };
        }

        function applyProgressData(data) {
          const prevLevel = state.levelIndex;
          state.levelIndex = clamp(Number(data.levelIndex) || 0, 0, LEVELS.length - 1);
          state.battery = clamp(Number(data.battery) || 100, 0, 100);
          state.fear = clamp(Number(data.fear) || 0, 0, 100);
          state.collected = Array.isArray(data.collected) ? data.collected : [];
          state.noteIds = Array.isArray(data.noteIds) ? data.noteIds : [];
          state.glowPowder = clamp(Number(data.glowPowder) || 0, 0, 12);
          state.glowMarks = Array.isArray(data.glowMarks) ? data.glowMarks : [];
          normalizeInventoryState();
          state.yaw = Number(data.yaw) || 0;
          state.pitch = Number(data.pitch) || 0;
          state.flashlightOn = data.flashlightOn !== false;
          state.allyOutlineEnabled = data.allyOutlineEnabled !== false;
          state.allyOutlineDistance = clamp(Number(data.allyOutlineDistance) || 28, 3, 80);
          state.allyOutlineOpacity = clamp(Number(data.allyOutlineOpacity) || 0.45, 0.1, 1);
          if (data.position) {
            state.position.set(Number(data.position.x) || 0, PLAYER_HEIGHT, Number(data.position.z) || 0);
          } else {
            state.position.set(0, PLAYER_HEIGHT, 0);
          }
          if (state.levelIndex !== prevLevel) {
            state.exitPointerAngleSmooth = null;
          }
        }

        function loadSaveSlots() {
          try {
            const raw = localStorage.getItem(SAVE_SLOTS_KEY);
            const slots = raw ? JSON.parse(raw) : [];
            return Array.isArray(slots) ? slots : [];
          } catch (error) {
            console.warn("Failed to load save slots", error);
            return [];
          }
        }

        function writeSaveSlots(slots) {
          localStorage.setItem(SAVE_SLOTS_KEY, JSON.stringify(slots));
          renderSaveLists();
        }

        function makeSaveSlot(data, name) {
          const now = Date.now();
          return {
            id: "save-" + now + "-" + Math.floor(Math.random() * 100000),
            name:
              name ||
              "存档 " +
                new Date(now).toLocaleString("zh-CN", {
                  month: "2-digit",
                  day: "2-digit",
                  hour: "2-digit",
                  minute: "2-digit",
                }),
            createdAt: now,
            updatedAt: now,
            data,
          };
        }

        function createNewSaveFromState(name) {
          const slot = makeSaveSlot(createProgressSnapshot(), name);
          const slots = loadSaveSlots();
          slots.unshift(slot);
          state.activeSaveId = slot.id;
          localStorage.setItem(ACTIVE_SAVE_KEY, slot.id);
          writeSaveSlots(slots);
          return slot;
        }

        function updateActiveSave(force = false) {
          if (!state.activeSaveId) {
            createNewSaveFromState("自动存档");
            return;
          }
          const slots = loadSaveSlots();
          const slot = slots.find((item) => item.id === state.activeSaveId);
          if (!slot) {
            createNewSaveFromState("自动存档");
            return;
          }
          slot.data = createProgressSnapshot();
          slot.updatedAt = Date.now();
          writeSaveSlots(slots);
        }

        function loadProgress(slotId) {
          const slots = migrateLegacySave(loadSaveSlots());
          const id = slotId || localStorage.getItem(ACTIVE_SAVE_KEY);
          const slot = slots.find((item) => item.id === id) || slots[0];
          if (!slot) {
            return false;
          }
          state.activeSaveId = slot.id;
          localStorage.setItem(ACTIVE_SAVE_KEY, slot.id);
          applyProgressData(slot.data || {});
          renderSaveLists();
          return true;
        }

        function migrateLegacySave(slots) {
          if (slots.length > 0) {
            return slots;
          }
          try {
            const legacy = localStorage.getItem(SAVE_KEY);
            if (!legacy) {
              return slots;
            }
            const slot = makeSaveSlot(JSON.parse(legacy), "旧版自动存档");
            slots.push(slot);
            localStorage.removeItem(SAVE_KEY);
            writeSaveSlots(slots);
            return slots;
          } catch (error) {
            console.warn("Failed to migrate legacy save", error);
            return slots;
          }
        }

        function deleteSaveSlot(id, ask = true) {
          if (!id) {
            return;
          }
          const slots = loadSaveSlots();
          const slot = slots.find((item) => item.id === id);
          if (!slot) {
            return;
          }
          if (ask && !window.confirm("删除存档「" + slot.name + "」？")) {
            return;
          }
          const nextSlots = slots.filter((item) => item.id !== id);
          if (state.activeSaveId === id) {
            state.activeSaveId = nextSlots[0] ? nextSlots[0].id : "";
            if (state.activeSaveId) {
              localStorage.setItem(ACTIVE_SAVE_KEY, state.activeSaveId);
            } else {
              localStorage.removeItem(ACTIVE_SAVE_KEY);
            }
          }
          writeSaveSlots(nextSlots);
        }

        function loadSaveSlotInGame(id) {
          if (state.started && !window.confirm("读取存档会覆盖当前未保存进度，继续？")) {
            return;
          }
          if (!state.started) {
            startGame(id);
            return;
          }
          if (!loadProgress(id)) {
            showMessage("存档读取失败。");
            return;
          }
          if (!scene) {
            startGame(id);
            return;
          }
          clearWorld();
          state.dead = false;
          state.paused = false;
          state.hiddenUntil = 0;
          applyLevelStyle();
          ensureWorldAroundPlayer();
          buildEntities();
          rebuildGlowMarks();
          updateCamera();
          ui.inventory.style.display = "none";
          if (ui.settings) {
            ui.settings.style.display = "none";
          }
          ui.gameOver.style.display = "none";
          ui.keypad.style.display = "none";
          showMessage("已读取存档。");
        }

        function renderSaveLists() {
          renderSaveList(ui.bootSaveList, false);
          renderSaveList(ui.saveList, true);
        }

        function renderSaveList(container, inGame) {
          if (!container) {
            return;
          }
          const slots = migrateLegacySave(loadSaveSlots());
          if (slots.length === 0) {
            container.innerHTML = '<p class="save-empty">暂无存档。</p>';
            return;
          }
          container.innerHTML = slots
            .map((slot) => {
              const data = slot.data || {};
              const active = slot.id === state.activeSaveId ? "（当前）" : "";
              const updated = slot.updatedAt ? new Date(slot.updatedAt).toLocaleString("zh-CN") : "未知时间";
              const noteCount = uniqueIds(data.noteIds).length;
              return (
                '<div class="save-slot" data-save-id="' +
                escapeHtml(slot.id) +
                '">' +
                "<div><strong>" +
                escapeHtml(slot.name + active) +
                "</strong><span>Level " +
                escapeHtml(data.levelIndex || 0) +
                " · 线索 " +
                noteCount +
                "/3 · " +
                escapeHtml(updated) +
                "</span></div>" +
                '<button class="mini-button" data-action="load">' +
                (inGame ? "读取" : "进入") +
                "</button>" +
                '<button class="mini-button danger" data-action="delete">删除</button>' +
                "</div>"
              );
            })
            .join("");
          container.querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", () => {
              const id = button.closest(".save-slot").dataset.saveId;
              if (button.dataset.action === "load") {
                loadSaveSlotInGame(id);
              } else {
                deleteSaveSlot(id, true);
              }
            });
          });
        }

        function saveProgress(force = false) {
          const now = performance.now();
          if (!force && now - state.lastSave < 2500) {
            return;
          }
          state.lastSave = now;
          updateActiveSave(force);
        }

        function updateCamera() {
          camera.position.copy(state.position);
          camera.rotation.order = "YXZ";
          camera.rotation.y = state.yaw;
          camera.rotation.x = state.pitch;
          const forward = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
          playerLight.position.copy(camera.position);
          playerLight.target.position.copy(camera.position).add(forward.multiplyScalar(5));
        }

        function getForwardRight() {
          const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), state.yaw);
          const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), state.yaw);
          forward.y = 0;
          right.y = 0;
          forward.normalize();
          right.normalize();
          return { forward, right };
        }

        function movePlayer(delta) {
          const moveInput = state.move.clone();
          if (keyState.forward) moveInput.y -= 1;
          if (keyState.backward) moveInput.y += 1;
          if (keyState.left) moveInput.x -= 1;
          if (keyState.right) moveInput.x += 1;
          if (moveInput.length() > 1) {
            moveInput.normalize();
          }
          if (state.hiddenUntil > performance.now()) {
            moveInput.multiplyScalar(0);
          }

          const { forward, right } = getForwardRight();
          const sedated = state.sedatedUntil > performance.now();
          const speed = (state.fear > 75 ? 2.85 : 3.45) * (sedated ? 0.86 : 1);
          const movement = new THREE.Vector3();
          movement.addScaledVector(right, moveInput.x);
          movement.addScaledVector(forward, -moveInput.y);
          if (movement.lengthSq() > 0) {
            movement.normalize().multiplyScalar(speed * delta);
          }

          attemptMove(movement.x, 0);
          attemptMove(0, movement.z);
          if (movement.lengthSq() > 0) {
            state.noiseLevel = clamp(state.noiseLevel + (sedated ? 10 : 16) * delta, 0, 100);
          }
          if (movement.lengthSq() > 0 && performance.now() - state.lastStepSound > 320) {
            state.lastStepSound = performance.now();
            playSound("step");
          }
        }

        function attemptMove(dx, dz) {
          if (dx === 0 && dz === 0) {
            return;
          }
          const next = state.position.clone();
          next.x += dx;
          next.z += dz;
          const radius = 0.42;
          const playerBox = new THREE.Box3(
            new THREE.Vector3(next.x - radius, 0.1, next.z - radius),
            new THREE.Vector3(next.x + radius, 1.9, next.z + radius),
          );
          const hit = blockers.some((blocker) => {
            blocker.box.setFromObject(blocker.mesh);
            return playerBox.intersectsBox(blocker.box);
          });
          if (!hit) {
            state.position.copy(next);
          } else {
            state.noiseLevel = clamp(state.noiseLevel + 6, 0, 100);
          }
        }

        function updateNearestInteractable() {
          if (state.hiddenUntil > performance.now()) {
            state.nearest = null;
            ui.prompt.textContent = "躲藏中，再次点击屏幕离开柜子";
            ui.prompt.classList.add("visible");
            return;
          }
          raycaster.setFromCamera({ x: 0, y: 0 }, camera);
          const hits = raycaster.intersectObjects(interactables, true);
          state.nearest = null;
          ui.prompt.classList.remove("visible");
          for (const hit of hits) {
            const root = findInteractableRoot(hit.object);
            if (!root) {
              continue;
            }
            const distance = camera.position.distanceTo(root.getWorldPosition(tempVector));
            if (distance <= INTERACT_DISTANCE) {
              state.nearest = root;
              ui.prompt.textContent = root.userData.interactable.label + "（点击）";
              ui.prompt.classList.add("visible");
              break;
            }
          }
          if (!state.nearest) {
            let closest = null;
            let closestDistance = Infinity;
            for (const object of interactables) {
              const distance = camera.position.distanceTo(object.getWorldPosition(tempVector));
              const data = object.userData.interactable;
              const easyDistance = state.levelIndex === 0 && data && data.type === "note" ? 3.1 : 1.8;
              if (distance < easyDistance && distance < closestDistance) {
                closest = object;
                closestDistance = distance;
              }
            }
            if (closest) {
              state.nearest = closest;
              ui.prompt.textContent = closest.userData.interactable.label + "（点击）";
              ui.prompt.classList.add("visible");
            }
          }
        }

        function findInteractableRoot(object) {
          let current = object;
          while (current) {
            if (current.userData && current.userData.interactable) {
              return current;
            }
            current = current.parent;
          }
          return null;
        }

        function interact() {
          if (state.paused || state.dead) {
            return;
          }
          if (state.hiddenUntil > performance.now()) {
            state.hiddenUntil = 0;
            playSound("lockerExit");
            showMessage("你推开柜门，重新回到走廊。");
            return;
          }
          if (!state.nearest) {
            showMessage("只有荧光灯在嗡嗡作响。");
            return;
          }
          const data = state.nearest.userData.interactable;
          if (data.type === "note") {
            collectItem(data);
            removeInteractable(state.nearest);
            addCollectedId(data.id);
            if (!state.noteIds.includes(data.id)) {
              state.noteIds.push(data.id);
            }
            normalizeInventoryState();
            playSound("pickup");
            showMessage(data.text);
            saveProgress(true);
          } else if (data.type === "battery") {
            state.battery = clamp(state.battery + 25, 0, 100);
            collectConsumable(data.id);
            playSound("battery");
            showMessage("电池装入手电，光束重新变亮。");
          } else if (data.type === "medkit") {
            state.fear = clamp(state.fear - 35, 0, 100);
            collectConsumable(data.id);
            playSound("medkit");
            showMessage("你强迫自己冷静下来。");
          } else if (data.type === "sedative") {
            state.fear = clamp(state.fear - 45, 0, 100);
            state.sedatedUntil = performance.now() + 12000;
            collectConsumable(data.id);
            playSound("medkit");
            showMessage("镇静剂让呼吸慢下来，但脚步也变得沉重。");
          } else if (data.type === "glowPowder") {
            state.glowPowder = clamp(state.glowPowder + 2, 0, 12);
            collectConsumable(data.id);
            playSound("pickup");
            showMessage("获得荧光粉 x2。打开背包或按 G 可以放置路标。");
          } else if (data.type === "locker") {
            state.hiddenUntil = performance.now() + 9000;
            playSound("locker");
            showMessage("你躲进柜子。再次点击屏幕可以出来。");
          } else if (data.type === "exit") {
            openKeypad();
          } else if (data.type === "fakeExit") {
            triggerFakeExit(state.nearest);
          }
        }

        function collectItem(data) {
          if (navigator.vibrate) {
            navigator.vibrate(35);
          }
        }

        function collectConsumable(id) {
          addCollectedId(id);
          normalizeInventoryState();
          removeInteractable(state.nearest);
          saveProgress(true);
          if (navigator.vibrate) {
            navigator.vibrate(25);
          }
        }

        function triggerFakeExit(object) {
          state.fear = clamp(state.fear + 28, 0, 100);
          state.noiseLevel = clamp(state.noiseLevel + 40, 0, 100);
          flashDamage();
          playSound("error");
          showMessage("门缝里吹出冷风，出口的形状突然塌陷了。");
          removeInteractable(object);
          saveProgress(true);
        }

        function createGlowMark(x, z) {
          const group = new THREE.Group();
          group.position.set(x, 0.028, z);
          const ring = new THREE.Mesh(
            new THREE.RingBufferGeometry(0.52, 0.68, 28),
            new THREE.MeshBasicMaterial({ color: 0xb8ff6b, transparent: true, opacity: 0.78, side: THREE.DoubleSide }),
          );
          ring.rotation.x = -Math.PI / 2;
          const dot = new THREE.Mesh(
            new THREE.CircleBufferGeometry(0.18, 20),
            new THREE.MeshBasicMaterial({ color: 0xeaff9f, transparent: true, opacity: 0.9, side: THREE.DoubleSide }),
          );
          dot.rotation.x = -Math.PI / 2;
          const light = new THREE.PointLight(0xb8ff6b, 0.6, 5, 2);
          light.position.y = 0.5;
          group.add(ring, dot, light);
          scene.add(group);
          placedGlowMarks.push(group);
        }

        function rebuildGlowMarks() {
          placedGlowMarks.forEach((mark) => {
            scene.remove(mark);
            disposeObject(mark);
          });
          placedGlowMarks.length = 0;
          state.glowMarks.forEach((mark) => {
            if (Number(mark.levelIndex) === state.levelIndex) {
              createGlowMark(Number(mark.x) || 0, Number(mark.z) || 0);
            }
          });
        }

        function placeGlowPowder() {
          if (!state.started || state.dead || state.paused || state.glowPowder <= 0) {
            showMessage(state.glowPowder <= 0 ? "没有荧光粉了。" : "现在不能放置标记。");
            return;
          }
          const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), state.yaw);
          const x = state.position.x + forward.x * 1.15;
          const z = state.position.z + forward.z * 1.15;
          state.glowPowder -= 1;
          state.glowMarks.push({ levelIndex: state.levelIndex, x, z });
          createGlowMark(x, z);
          playSound("pickup");
          showMessage("荧光粉在地毯上亮起。剩余 " + state.glowPowder + " 次。");
          saveProgress(true);
        }

        function removeInteractable(object) {
          if (object.userData.extras) {
            object.userData.extras.forEach((extra) => {
              if (extra.parent) {
                extra.parent.remove(extra);
              }
            });
          }
          scene.remove(object);
          const index = interactables.indexOf(object);
          if (index >= 0) {
            interactables.splice(index, 1);
          }
          state.nearest = null;
          ui.prompt.classList.remove("visible");
        }

        function uniqueIds(ids) {
          return Array.from(new Set(Array.isArray(ids) ? ids : []));
        }

        function normalizeInventoryState() {
          state.collected = uniqueIds(state.collected);
          state.noteIds = uniqueIds(state.noteIds).filter((id) => state.collected.includes(id));
        }

        function addCollectedId(id) {
          if (!state.collected.includes(id)) {
            state.collected.push(id);
          }
        }

        function inventoryItems() {
          const level = currentLevel();
          normalizeInventoryState();
          const notes = state.noteIds.map((id) => {
            const index = Number(id.split("-").pop());
            return {
              id,
              title: "线索纸条 " + (index + 1),
              text: level.notes[index] || "纸上只有潮湿的霉味。",
              detail: "作用：记录密码线索，集齐 3 张后可解开本层出口密码。",
            };
          });
          const consumables = state.collected
            .filter((id) => !id.startsWith("note-"))
            .map((id) => {
              if (id.startsWith("battery-")) {
                return {
                  id,
                  title: "已拾取电池",
                  text: "拾取时立即为手电补充 25% 电量。",
                  detail: "作用：延长照明时间，手电开启时能压制笑魇。",
                };
              }
              if (id.startsWith("medkit-")) {
                return {
                  id,
                  title: "已使用急救包",
                  text: "拾取时立即降低 35% 恐惧值。",
                  detail: "作用：缓解靠近实体或黑暗环境造成的恐惧压力。",
                };
              }
              if (id.startsWith("sedative-")) {
                return {
                  id,
                  title: "已注射镇静剂",
                  text: "拾取时立即降低恐惧，并短时间抑制恐惧增长。",
                  detail: "副作用：镇静期间移动略慢，但更适合穿越黑暗区域。",
                };
              }
              if (id.startsWith("glowpowder-")) {
                return {
                  id,
                  title: "已拾取荧光粉",
                  text: "提供可放置的地面路标次数。",
                  detail: "作用：在迷宫里标记走过的路线。",
                };
              }
              return {
                id,
                title: "已拾取物品",
                text: id,
                detail: "作用：已记录在当前存档中。",
              };
            });
          const usable =
            state.glowPowder > 0
              ? [
                  {
                    id: "glowpowder-use",
                    title: "荧光粉标记 x" + state.glowPowder,
                    text: "点击使用，或按 G，在脚前放置一个发光路标。",
                    detail: "作用：解决迷路，不直接暴露出口位置。",
                    action: "useGlowPowder",
                  },
                ]
              : [];
          return usable.concat(notes, consumables);
        }

        function renderInventory() {
          const items = inventoryItems();
          if (items.length === 0) {
            ui.inventoryList.innerHTML = "<p>背包里空空的。先去寻找纸条、电池和急救包。</p>";
            return;
          }
          ui.inventoryList.innerHTML = items
            .map(
              (item) =>
                '<div class="item-card"><strong>' +
                escapeHtml(item.title) +
                "</strong><span>" +
                escapeHtml(item.text) +
                "</span><p>" +
                escapeHtml(item.detail) +
                "</p>" +
                (item.action === "useGlowPowder"
                  ? '<button class="mini-button" data-inventory-action="useGlowPowder">使用</button>'
                  : "") +
                "</div>",
            )
            .join("");
          ui.inventoryList.querySelectorAll("[data-inventory-action='useGlowPowder']").forEach((button) => {
            button.addEventListener("click", () => {
              closeInventory();
              placeGlowPowder();
            });
          });
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function normalizeRoomId(value) {
          return String(value || "")
            .trim()
            .toUpperCase()
            .replace(/[^A-Z0-9-]/g, "")
            .slice(0, 8);
        }

        function generateRoomId() {
          return Math.random().toString(36).slice(2, 8).toUpperCase();
        }

        function setNetworkStatus(text) {
          ui.networkStatus.textContent = text;
          ui.onlineStatus.textContent = text;
        }

        function ensureSocket() {
          if (!window.io) {
            setNetworkStatus("Socket.IO 未加载，请检查网络。");
            return null;
          }
          if (network.socket) {
            return network.socket;
          }
          network.socket = window.io(SOCKET_SERVER_URL, {
            transports: ["websocket", "polling"],
            reconnectionAttempts: 6,
          });

          network.socket.on("connect", () => {
            network.connected = true;
            setNetworkStatus(network.roomId ? "已连接房间 " + network.roomId : "已连接，等待加入房间");
            if (network.roomId) {
              network.socket.emit("room:join", { roomId: network.roomId });
            }
          });

          network.socket.on("connect_error", () => {
            network.connected = false;
            setNetworkStatus("联机服务未连接，先运行 npm start。");
          });

          network.socket.on("disconnect", () => {
            network.connected = false;
            setNetworkStatus("联机已断开");
            clearRemotePlayers();
          });

          network.socket.on("room:joined", (payload) => {
            const peers = Array.isArray(payload.peers) ? payload.peers : [];
            network.roomId = normalizeRoomId(payload.roomId || network.roomId);
            ui.roomInput.value = network.roomId;
            setNetworkStatus("房间 " + network.roomId + " · " + (peers.length + 1) + " 人在线");
            peers.forEach((peer) => updateRemotePlayer(peer.id, peer.state));
            showMessage("已加入联机房间 " + network.roomId + "。");
          });

          network.socket.on("player:joined", () => {
            setNetworkStatus("房间 " + network.roomId + " · 有玩家加入");
            sendNetworkState(true);
          });

          network.socket.on("player:left", (payload) => {
            removeRemotePlayer(payload && payload.id);
            setNetworkStatus(network.roomId ? "房间 " + network.roomId : "未联机");
          });

          network.socket.on("player:state", (payload) => {
            if (!payload || payload.id === network.socket.id) {
              return;
            }
            updateRemotePlayer(payload.id, payload.state);
          });

          return network.socket;
        }

        function joinRoom(roomId) {
          const normalized = normalizeRoomId(roomId || ui.roomInput.value);
          if (!normalized) {
            setNetworkStatus("请输入房间号。");
            return;
          }
          network.roomId = normalized;
          ui.roomInput.value = normalized;
          const socket = ensureSocket();
          if (!socket) {
            return;
          }
          setNetworkStatus("正在加入房间 " + normalized + "...");
          if (socket.connected) {
            socket.emit("room:join", { roomId: normalized });
          }
        }

        function createRoom() {
          joinRoom(generateRoomId());
        }

        function createNetworkPayload() {
          return {
            levelIndex: state.levelIndex,
            x: state.position.x,
            z: state.position.z,
            yaw: state.yaw,
            pitch: state.pitch,
            flashlightOn: state.flashlightOn && state.battery > 0,
            expression: state.playerExpression,
            action: state.playerAction,
            actionAt: state.playerActionAt,
          };
        }

        function sendNetworkState(force = false) {
          if (!network.socket || !network.socket.connected || !network.roomId || !state.started) {
            return;
          }
          const now = performance.now();
          if (!force && now - network.lastSend < NETWORK_SEND_INTERVAL) {
            return;
          }
          network.lastSend = now;
          network.socket.emit("player:update", createNetworkPayload());
        }

        function openInventory() {
          if (ui.settings) {
            ui.settings.style.display = "none";
          }
          renderInventory();
          state.paused = true;
          ui.inventory.style.display = "flex";
        }

        function closeInventory() {
          ui.inventory.style.display = "none";
          resumeIfNoModal();
        }

        function openSettings() {
          if (ui.inventory) {
            ui.inventory.style.display = "none";
          }
          renderSaveLists();
          syncTeammateOutlineControls();
          state.paused = true;
          if (ui.settings) {
            ui.settings.style.display = "flex";
          }
        }

        function closeSettings() {
          if (ui.settings) {
            ui.settings.style.display = "none";
          }
          resumeIfNoModal();
        }

        function backToMainMenu() {
          if (network.socket && network.roomId) {
            network.socket.emit("room:leave");
          }
          network.roomId = "";
          clearRemotePlayers();
          setNetworkStatus("未联机");
          if (ui.roomInput) {
            ui.roomInput.value = "";
          }

          if (ui.settings) {
            ui.settings.style.display = "none";
          }
          ui.inventory.style.display = "none";
          ui.keypad.style.display = "none";
          ui.gameOver.style.display = "none";
          if (ui.posePanel) {
            ui.posePanel.classList.remove("visible");
          }

          state.started = false;
          state.paused = true;
          state.dead = false;
          state.won = false;
          state.hiddenUntil = 0;
          state.posePanelOpen = false;

          ui.boot.style.display = "flex";
          renderSaveLists();
        }

        function resumeIfNoModal() {
          if (
            ui.inventory.style.display !== "flex" &&
            (!ui.settings || ui.settings.style.display !== "flex") &&
            ui.keypad.style.display !== "flex"
          ) {
            state.paused = false;
          }
        }

        function openKeypad() {
          state.inputCode = "";
          ui.codeDisplay.textContent = "";
          ui.inventory.style.display = "none";
          if (ui.settings) {
            ui.settings.style.display = "none";
          }
          state.paused = true;
          ui.keypad.style.display = "flex";
          playSound("keypad");
        }

        function closeKeypad() {
          ui.keypad.style.display = "none";
          resumeIfNoModal();
        }

        function pressKey(value) {
          playSound("tap");
          if (value === "del") {
            state.inputCode = state.inputCode.slice(0, -1);
          } else if (value === "ok") {
            submitCode();
          } else if (state.inputCode.length < 3) {
            state.inputCode += value;
          }
          ui.codeDisplay.textContent = state.inputCode;
        }

        function submitCode() {
          if (state.inputCode === currentLevel().code) {
            closeKeypad();
            playSound("success");
            showMessage("密码锁咔哒一声打开，空间开始折叠。");
            setTimeout(nextLevel, 900);
          } else {
            state.fear = clamp(state.fear + 8, 0, 100);
            state.inputCode = "";
            ui.codeDisplay.textContent = "";
            playSound("error");
            showMessage("密码错误。远处传来回应般的脚步声。");
            if (navigator.vibrate) {
              navigator.vibrate([30, 40, 30]);
            }
          }
        }

        function updateEntities(delta, time) {
          let closestThreat = Infinity;
          const now = performance.now();
          for (const entity of entities) {
            const object = entity.object;
            const dx = object.position.x - state.position.x;
            const dz = object.position.z - state.position.z;
            const distance = Math.hypot(dx, dz);
            closestThreat = Math.min(closestThreat, distance);

            if (entity.type === "smiler") {
              updateSmiler(entity, delta, distance);
            } else if (entity.type === "partygoer") {
              updatePartygoer(entity, delta, distance, time);
            } else if (entity.type === "skin") {
              updateSkinStealer(entity, delta, distance);
            } else if (entity.type === "moth") {
              updateLightMoth(entity, delta, distance, time);
            } else {
              updateListener(entity, delta, distance, time);
            }
            updateEntityFootsteps(entity, distance, now);

            if (distance < 1.05 && state.hiddenUntil < now) {
              flashDamage();
              const msg =
                entity.type === "smiler"
                  ? "黑暗中的笑脸扑到了眼前。"
                  : entity.type === "partygoer"
                    ? "派对客的笑脸贴得太近了。"
                    : entity.type === "moth"
                      ? "灯蛾扑进光束，尖锐的翅声贴住了耳朵。"
                      : entity.type === "listener"
                        ? "听声者循着脚步声摸到了你身边。"
                        : "伪装碎裂，红色的轮廓扑了过来。";
              showGameOver("你被实体发现了", msg);
            }
          }
          state.closestThreat = closestThreat;

          if (closestThreat < 8 && state.hiddenUntil < performance.now()) {
            state.fear = clamp(state.fear + (8 - closestThreat) * delta * 3.2, 0, 100);
          }
        }

        function updateEntityFootsteps(entity, distance, now) {
          if (distance > 18 || state.hiddenUntil > now) {
            return;
          }
          const baseInterval =
            entity.type === "partygoer" ? 720 : entity.type === "skin" ? 430 : entity.type === "listener" ? 820 : 620;
          const interval = clamp(baseInterval + distance * 24, 360, 1050);
          if (now - entity.lastStepSound > interval) {
            entity.lastStepSound = now;
            playSound("monsterStep", clamp(1 - distance / 18, 0.18, 1));
          }
        }

        function updateSmiler(entity, delta, distance) {
          const object = entity.object;
          object.material.opacity = state.flashlightOn ? 0.45 : 1;
          if (state.flashlightOn && isLookingAt(object.position, 0.72) && distance < 13) {
            object.position.lerp(entity.origin.clone().add(new THREE.Vector3(0, 1.65, 0)), 0.04);
            return;
          }
          if (!state.flashlightOn || state.battery < 12 || distance < 5) {
            chase(entity, delta, state.flashlightOn ? 0.7 : 1.25);
          } else {
            hoverPatrol(entity, delta);
          }
        }

        function updatePartygoer(entity, delta, distance, time) {
          const chasing = distance < 6 && state.hiddenUntil < performance.now();
          if (chasing) {
            chase(entity, delta, 0.95);
          } else {
            const object = entity.object;
            object.position.x = entity.origin.x + Math.sin(time * 0.36 + entity.phase) * 5.5;
            object.position.z = entity.origin.z + Math.cos(time * 0.29 + entity.phase) * 5.5;
            object.rotation.y = Math.atan2(Math.cos(time * 0.36 + entity.phase), -Math.sin(time * 0.29 + entity.phase));
          }
        }

        function updateSkinStealer(entity, delta, distance) {
          const object = entity.object;
          if (entity.hidden && distance < 2.4) {
            entity.hidden = false;
            object.children[0].material.color.setHex(0xb92323);
            showMessage("箱子动了。");
          }
          if (!entity.hidden) {
            chase(entity, delta, 1.1);
          }
        }

        function updateLightMoth(entity, delta, distance, time) {
          const object = entity.object;
          object.position.y = 1.55 + Math.sin(time * 7 + entity.phase) * 0.28;
          if (object.userData.wings) {
            object.userData.wings[0].rotation.y = Math.sin(time * 18 + entity.phase) * 0.55;
            object.userData.wings[1].rotation.y = -Math.sin(time * 18 + entity.phase) * 0.55;
          }
          if (state.flashlightOn && state.battery > 0 && distance < 22) {
            chase(entity, delta, distance < 7 ? 1.35 : 0.95);
            if (distance < 6) {
              state.fear = clamp(state.fear + delta * 5.5, 0, 100);
            }
            return;
          }
          hoverPatrol(entity, delta);
        }

        function updateListener(entity, delta, distance, time) {
          const object = entity.object;
          object.rotation.y += Math.sin(time * 2 + entity.phase) * 0.004;
          const hunting = state.noiseLevel > 18 && distance < 28 && state.hiddenUntil < performance.now();
          if (hunting) {
            chase(entity, delta, clamp(0.65 + state.noiseLevel / 80, 0.75, 1.45));
            if (distance < 8) {
              state.fear = clamp(state.fear + delta * (state.noiseLevel / 9), 0, 100);
            }
            return;
          }
          entity.phase += delta * 0.38;
          object.position.x = entity.origin.x + Math.sin(entity.phase) * 2.2;
          object.position.z = entity.origin.z + Math.cos(entity.phase * 0.8) * 2.2;
          object.position.y = 0;
        }

        function chase(entity, delta, multiplier) {
          const object = entity.object;
          const target = state.position.clone();
          if (state.hiddenUntil > performance.now()) {
            target.copy(entity.origin);
          }
          const direction = target.sub(object.position);
          direction.y = 0;
          if (direction.lengthSq() > 0.01) {
            direction.normalize();
            object.position.addScaledVector(direction, entity.speed * multiplier * delta);
            object.rotation.y = Math.atan2(direction.x, direction.z);
          }
        }

        function hoverPatrol(entity, delta) {
          const object = entity.object;
          entity.phase += delta;
          object.position.x = entity.origin.x + Math.sin(entity.phase * 0.7) * 2.6;
          object.position.z = entity.origin.z + Math.cos(entity.phase * 0.5) * 2.6;
          object.position.y = 1.55 + Math.sin(entity.phase * 2.2) * 0.12;
        }

        function isLookingAt(position, threshold) {
          const forward = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation).normalize();
          const direction = position.clone().sub(camera.position).normalize();
          return forward.dot(direction) > threshold;
        }

        function updateSurvival(delta) {
          state.noiseLevel = Math.max(0, state.noiseLevel - delta * 9);
          if (state.flashlightOn && state.battery > 0) {
            state.battery = clamp(state.battery - delta * 0.92, 0, 100);
          }
          if (state.battery <= 0) {
            state.flashlightOn = false;
          }

          const dark = !state.flashlightOn || state.battery <= 0;
          if (dark) {
            state.darkTime += delta;
            state.fear = clamp(state.fear + delta * (state.sedatedUntil > performance.now() ? 1.6 : 4.4), 0, 100);
          } else {
            state.darkTime = Math.max(0, state.darkTime - delta);
            state.fear = clamp(state.fear - delta * 2.5, 0, 100);
          }

          if (state.hiddenUntil > performance.now()) {
            state.fear = clamp(state.fear - delta * 8, 0, 100);
          }

          if (state.darkTime > 24 || state.fear >= 100) {
            showGameOver("恐惧吞没了你", "手电熄灭太久，后室开始学会你的呼吸。");
          }

          playerLight.visible = state.flashlightOn && state.battery > 0;
          playerLight.intensity = playerLight.visible ? 1.1 + state.battery / 80 : 0;
          playerLight.distance = 10 + state.battery / 5;
        }

        function updateHud() {
          ui.batteryLabel.textContent = Math.round(state.battery) + "%";
          ui.fearLabel.textContent = Math.round(state.fear) + "%";
          ui.batteryMeter.style.width = state.battery + "%";
          ui.fearMeter.style.width = state.fear + "%";
          ui.fearMeter.style.background = state.fear > 70 ? "#ff4b4b" : "linear-gradient(90deg, #8affac, #ffd36d)";
          ui.flashlightButton.classList.toggle("active", state.flashlightOn);
          ui.levelLabel.textContent = String(state.levelIndex);

          const notes = state.noteIds.length;
          let guidance = "";
          const nextNote = getNextLevelZeroNoteSlot();
          if (nextNote) {
            guidance = " 跟着地上的脚印和" + getDirectionLabel(nextNote) + "的脚步声找下一张。";
          }
          ui.objective.textContent = currentLevel().objective + " 已收集线索 " + notes + "/3。" + guidance;
          updatePosePanelVisibility();
          updateExitPointer();
        }

        function updateLights(time) {
          generatedCells.forEach((cell) => {
            cell.group.traverse((object) => {
              if (object.isPointLight && object.userData.flickerSeed !== undefined) {
                const seed = object.userData.flickerSeed;
                const pulse = Math.sin(time * 6.5 + seed) * 0.12 + Math.sin(time * 17.3 + seed) * 0.05;
                const blink = Math.sin(time * 0.9 + seed) > 0.965 ? -0.42 : 0;
                object.intensity = clamp(0.52 + pulse + blink, 0.08, 0.75);
              }
            });
          });
        }

        let poseActionFeedbackTimer = null;

        function pulsePoseActionButton(actionId) {
          if (!ui.actionRow) {

        function buildPoseControls() {
          if (!ui.expressionRow || !ui.actionRow) {

          ui.actionRow.innerHTML = "";
          ACTION_CHIPS.forEach((chip) => {

            btn.addEventListener("click", () => triggerPlayerAction(chip.id));
            ui.actionRow.appendChild(btn);
          });
          syncPoseChipUi();
          syncPosePanelCollapse();
        }

        function setupControls() {
          let joystickTouch = null;
          let lookTouch = null;
          let lookStartX = 0;
          let lookStartY = 0;
          let lastTapTime = 0;
          const stickRadius = 48;

          ui.joystick.addEventListener(
            "touchstart",
            (event) => {
              event.preventDefault();
              const touch = event.changedTouches[0];
              joystickTouch = touch.identifier;
              updateJoystick(touch, stickRadius);
            },
            { passive: false },
          );

          ui.joystick.addEventListener(
            "touchmove",
            (event) => {
              event.preventDefault();
              for (const touch of event.changedTouches) {
                if (touch.identifier === joystickTouch) {
                  updateJoystick(touch, stickRadius);
                }
              }
            },
            { passive: false },
          );

          ui.joystick.addEventListener("touchend", (event) => {
            for (const touch of event.changedTouches) {
              if (touch.identifier === joystickTouch) {
                joystickTouch = null;
                state.move.set(0, 0);
                ui.stick.style.transform = "translate(0px, 0px)";
              }
            }
          });

          window.addEventListener(
            "touchstart",
            (event) => {
              if (
                event.target.closest(
                  "#joystick, #actions, #posePanel, #inventory, #settings, #keypad, #gameOver, #boot",
                )
              ) {
                return;
              }
              const touch = event.changedTouches[0];
              lookTouch = touch.identifier;
              lookStartX = touch.clientX;
              lookStartY = touch.clientY;
              lastTapTime = performance.now();
            },
            { passive: false },
          );

          window.addEventListener(
            "touchmove",
            (event) => {
              if (lookTouch === null) {
                return;
              }
              for (const touch of event.changedTouches) {
                if (touch.identifier === lookTouch) {
                  const dx = touch.clientX - lookStartX;
                  const dy = touch.clientY - lookStartY;
                  lookStartX = touch.clientX;
                  lookStartY = touch.clientY;
                  rotateView(dx, dy);
                  event.preventDefault();
                }
              }
            },
            { passive: false },
          );

          window.addEventListener("touchend", (event) => {
            for (const touch of event.changedTouches) {
              if (touch.identifier === lookTouch) {
                const elapsed = performance.now() - lastTapTime;
                lookTouch = null;
                if (elapsed < 220) {
                  interact();
                }
              }
            }
          });

          if (ui.posePanelToggle) {
            ui.posePanelToggle.addEventListener("click", (event) => {
              event.stopPropagation();
              togglePosePanelCollapsed();
            });
          }

          window.addEventListener("mousedown", (event) => {
            if (event.target.closest("#hud button, #inventory, #settings, #keypad, #gameOver, #boot")) {
              return;
            }
            lookTouch = -1;
            lookStartX = event.clientX;
            lookStartY = event.clientY;
            lastTapTime = performance.now();
          });

          window.addEventListener("mousemove", (event) => {
            if (lookTouch !== -1) {
              return;
            }
            rotateView(event.clientX - lookStartX, event.clientY - lookStartY);
            lookStartX = event.clientX;
            lookStartY = event.clientY;
          });

          window.addEventListener("mouseup", () => {
            if (lookTouch === -1 && performance.now() - lastTapTime < 220) {
              interact();
            }
            lookTouch = null;
          });

          window.addEventListener("keydown", (event) => {
            if (event.code === "KeyW" || event.code === "ArrowUp") keyState.forward = true;
            if (event.code === "KeyS" || event.code === "ArrowDown") keyState.backward = true;
            if (event.code === "KeyA" || event.code === "ArrowLeft") keyState.left = true;
            if (event.code === "KeyD" || event.code === "ArrowRight") keyState.right = true;
            if (event.code === "KeyE") interact();
            if (event.code === "KeyF") toggleFlashlight();
            if (event.code === "KeyG") placeGlowPowder();
            if (event.code === "KeyV") {
              toggleAllyOutlineEnabled();
            }
            const modalOpen =
              ui.keypad.style.display === "flex" ||
              ui.inventory.style.display === "flex" ||
              (ui.settings && ui.settings.style.display === "flex");
            if (state.started && !state.dead && !modalOpen) {
              const exprKeys = ["Digit1", "Digit2", "Digit3", "Digit4", "Digit5"];
              const i = exprKeys.indexOf(event.code);
              if (i >= 0 && EXPRESSION_CHIPS[i]) {
                setPlayerExpression(EXPRESSION_CHIPS[i].id);
                event.preventDefault();
              }
              if (event.code === "Digit6") {
                triggerPlayerAction("wave");
                event.preventDefault();
              }
              if (event.code === "Digit7") {
                triggerPlayerAction("nod");
                event.preventDefault();
              }
              if (event.code === "Digit8") {
                triggerPlayerAction("point");
                event.preventDefault();
              }
              if (event.code === "Digit9") {
                triggerPlayerAction("shrug");
                event.preventDefault();
              }
            }
          });

          window.addEventListener("keyup", (event) => {
            if (event.code === "KeyW" || event.code === "ArrowUp") keyState.forward = false;
            if (event.code === "KeyS" || event.code === "ArrowDown") keyState.backward = false;
            if (event.code === "KeyA" || event.code === "ArrowLeft") keyState.left = false;
            if (event.code === "KeyD" || event.code === "ArrowRight") keyState.right = false;
          });

          ui.flashlightButton.addEventListener("click", toggleFlashlight);
          ui.inventoryButton.addEventListener("click", openInventory);
          if (ui.settingsButton) {
            ui.settingsButton.addEventListener("click", openSettings);
          }
          if (ui.poseMenuButton) {
            ui.poseMenuButton.addEventListener("click", (event) => {
              event.stopPropagation();
              togglePosePanelFromHud();
            });
          }
          ui.manualSaveButton.addEventListener("click", () => {
            saveProgress(true);
            renderSaveLists();
            showMessage("当前进度已保存。");
          });
          ui.newSaveButton.addEventListener("click", () => {
            createNewSaveFromState();
            renderSaveLists();
            showMessage("已新增一个存档。");
          });
          ui.closeInventory.addEventListener("click", closeInventory);
          if (ui.closeSettings) {
            ui.closeSettings.addEventListener("click", closeSettings);
          }
          if (ui.mainMenuButton) {
            ui.mainMenuButton.addEventListener("click", backToMainMenu);
          }
          if (ui.teammateOutlineToggle) {
            ui.teammateOutlineToggle.addEventListener("change", () => {
              state.allyOutlineEnabled = Boolean(ui.teammateOutlineToggle.checked);
              refreshRemoteOutlines();
            });
          }
          if (ui.teammateOutlineDistance) {
            ui.teammateOutlineDistance.addEventListener("change", () => {
              const nextDistance = clamp(Number(ui.teammateOutlineDistance.value) || 28, 3, 80);
              state.allyOutlineDistance = nextDistance;
              ui.teammateOutlineDistance.value = String(nextDistance);
              refreshRemoteOutlines();
            });
          }
          if (ui.teammateOutlineOpacity) {
            ui.teammateOutlineOpacity.addEventListener("input", () => {
              const nextOpacity = clamp(Number(ui.teammateOutlineOpacity.value) || 0.45, 0.1, 1);
              state.allyOutlineOpacity = nextOpacity;
              refreshRemoteOutlines();
            });
          }
          ui.closeKeypad.addEventListener("click", closeKeypad);
          ui.resetButton.addEventListener("click", () => {
            closeInventory();
            closeSettings();
            resetLevel(true);
          });
          ui.retryButton.addEventListener("click", () => resetLevel(true));

          ["1", "2", "3", "4", "5", "6", "7", "8", "9", "del", "0", "ok"].forEach((value) => {
            const button = document.createElement("button");
            button.textContent = value === "del" ? "删" : value === "ok" ? "确认" : value;
            button.addEventListener("click", () => pressKey(value));
            ui.keys.appendChild(button);
          });

          buildPoseControls();
        }

        function syncTeammateOutlineControls() {
          if (ui.teammateOutlineToggle) {
            ui.teammateOutlineToggle.checked = Boolean(state.allyOutlineEnabled);
          }
          if (ui.teammateOutlineDistance) {
            ui.teammateOutlineDistance.value = String(clamp(Number(state.allyOutlineDistance) || 28, 3, 80));
          }
          if (ui.teammateOutlineOpacity) {
            ui.teammateOutlineOpacity.value = String(clamp(Number(state.allyOutlineOpacity) || 0.45, 0.1, 1));
          }
        }

        function toggleAllyOutlineEnabled() {
          state.allyOutlineEnabled = !state.allyOutlineEnabled;
          syncTeammateOutlineControls();
          refreshRemoteOutlines();
          showMessage(state.allyOutlineEnabled ? "已开启队友穿墙轮廓。" : "已关闭队友穿墙轮廓。");
        }

        function updateJoystick(touch, radius) {
          const rect = ui.joystick.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          let dx = touch.clientX - cx;
          let dy = touch.clientY - cy;
          const length = Math.hypot(dx, dy);
          if (length > radius) {
            dx = (dx / length) * radius;
            dy = (dy / length) * radius;
          }
          ui.stick.style.transform = "translate(" + dx + "px, " + dy + "px)";
          state.move.set(dx / radius, dy / radius);
        }

        function rotateView(dx, dy) {
          if (state.paused) {
            return;
          }
          state.yaw -= dx * 0.0032;
          state.pitch -= dy * 0.0026;
          state.pitch = clamp(state.pitch, -Math.PI / 3, Math.PI / 3);
        }

        function toggleFlashlight() {
          if (state.battery <= 0) {
            playSound("error");
            showMessage("手电没有电了。");
            return;
          }
          state.flashlightOn = !state.flashlightOn;
          playSound("flashlight");
          sendNetworkState(true);
          if (navigator.vibrate) {
            navigator.vibrate(18);
          }
        }

        function playSound(name, intensity = 1) {
          if (!audioContext || !sfxGain) {
            return;
          }
          const now = audioContext.currentTime;
          if (name === "pickup") {
            playTone(740, 0.08, "sine", 0.09, now);
            playTone(1180, 0.12, "sine", 0.07, now + 0.07);
          } else if (name === "battery") {
            playTone(260, 0.08, "square", 0.05, now);
            playTone(520, 0.16, "triangle", 0.08, now + 0.05);
          } else if (name === "medkit") {
            playTone(420, 0.09, "sine", 0.07, now);
            playTone(620, 0.16, "sine", 0.06, now + 0.08);
          } else if (name === "locker") {
            playNoise(0.18, 0.08, 420);
            playTone(120, 0.12, "sawtooth", 0.04, now + 0.08);
          } else if (name === "lockerExit") {
            playNoise(0.12, 0.055, 620);
            playTone(220, 0.08, "triangle", 0.035, now + 0.04);
          } else if (name === "keypad" || name === "tap") {
            playTone(name === "tap" ? 680 : 320, 0.045, "square", 0.035, now);
          } else if (name === "success") {
            playTone(440, 0.1, "triangle", 0.09, now);
            playTone(660, 0.12, "triangle", 0.08, now + 0.08);
            playTone(880, 0.18, "triangle", 0.07, now + 0.18);
          } else if (name === "error") {
            playTone(170, 0.16, "sawtooth", 0.08, now);
            playTone(130, 0.18, "sawtooth", 0.06, now + 0.12);
          } else if (name === "flashlight") {
            playTone(state.flashlightOn ? 520 : 260, 0.055, "square", 0.06, now);
            playNoise(0.035, 0.035, 1700);
          } else if (name === "step") {
            playNoise(0.075, 0.045, 190);
            playTone(85, 0.045, "triangle", 0.018, now);
          } else if (name === "monsterStep") {
            playNoise(0.12, 0.035 + intensity * 0.09, 95 + intensity * 90);
            playTone(48 + intensity * 26, 0.12, "sine", 0.018 + intensity * 0.035, now);
          } else if (name === "danger") {
            playTone(92, 0.28, "sawtooth", 0.075, now);
            playNoise(0.16, 0.04, 260);
          } else if (name === "lowBattery") {
            playTone(760, 0.06, "square", 0.06, now);
            playTone(760, 0.06, "square", 0.05, now + 0.12);
          } else if (name === "death") {
            playNoise(0.35, 0.12, 120);
            playTone(80, 0.55, "sawtooth", 0.09, now);
          }
        }

        function playTone(frequency, duration, type, volume, startTime) {
          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          oscillator.type = type;
          oscillator.frequency.setValueAtTime(frequency, startTime);
          gain.gain.setValueAtTime(0.0001, startTime);
          gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.012);
          gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
          oscillator.connect(gain);
          gain.connect(sfxGain);
          oscillator.start(startTime);
          oscillator.stop(startTime + duration + 0.03);
        }

        function playNoise(duration, volume, frequency) {
          const bufferSize = Math.max(1, Math.floor(audioContext.sampleRate * duration));
          const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
          const output = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i += 1) {
            output[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
          }
          const source = audioContext.createBufferSource();
          const filter = audioContext.createBiquadFilter();
          const gain = audioContext.createGain();
          source.buffer = buffer;
          filter.type = "lowpass";
          filter.frequency.value = frequency;
          gain.gain.value = volume;
          source.connect(filter);
          filter.connect(gain);
          gain.connect(sfxGain);
          source.start();
        }

        function startAudio() {
          if (audioContext) {
            if (audioContext.state === "suspended") {
              audioContext.resume();
            }
            return;
          }
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
          sfxGain = audioContext.createGain();
          sfxGain.gain.value = 0.55;
          sfxGain.connect(audioContext.destination);
          const bufferSize = 2 * audioContext.sampleRate;
          const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
          const output = noiseBuffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i += 1) {
            output[i] = (Math.random() * 2 - 1) * 0.035;
          }
          const noise = audioContext.createBufferSource();
          noise.buffer = noiseBuffer;
          noise.loop = true;
          const filter = audioContext.createBiquadFilter();
          filter.type = "bandpass";
          filter.frequency.value = 170;
          noiseGain = audioContext.createGain();
          noiseGain.gain.value = 0.08;
          noise.connect(filter);
          filter.connect(noiseGain);
          noiseGain.connect(audioContext.destination);
          noise.start();
        }

        function updateAudio() {
          if (!noiseGain) {
            return;
          }
          const target = 0.035 + state.fear / 900 + (state.flashlightOn ? 0.025 : 0.07);
          noiseGain.gain.setTargetAtTime(target, audioContext.currentTime, 0.12);
          const now = performance.now();
          const nextNote = getNextLevelZeroNoteSlot();
          if (nextNote && now > state.nextGuideSound) {
            state.nextGuideSound = now + 4200;
            playGuideStepTo(nextNote);
          }
          if (state.closestThreat < 7 && now > state.nextDangerSound && state.hiddenUntil < now) {
            state.nextDangerSound = now + clamp(state.closestThreat * 420, 900, 2600);
            playSound("danger");
          }
          if (state.flashlightOn && state.battery > 0 && state.battery < 22 && now > state.nextLowBatterySound) {
            state.nextLowBatterySound = now + 2800;
            playSound("lowBattery");
          }
        }

        function getNextLevelZeroNoteSlot() {
          if (state.levelIndex !== 0) {
            return null;
          }
          return LEVEL_ZERO_NOTE_SLOTS.find((slot) => !state.noteIds.includes("note-0-" + slot.note)) || null;
        }

        function getNoteWorldPosition(slot) {
          return new THREE.Vector3(slot.x * CELL_SIZE + slot.px, PLAYER_HEIGHT, slot.z * CELL_SIZE + slot.pz);
        }

        function getDirectionLabel(slot) {
          const toNote = getNoteWorldPosition(slot).sub(state.position);
          const angle = Math.atan2(toNote.x, -toNote.z) - state.yaw;
          const normalized = Math.atan2(Math.sin(angle), Math.cos(angle));
          if (Math.abs(normalized) < 0.45) {
            return "前方";
          }
          if (Math.abs(normalized) > 2.55) {
            return "身后";
          }
          return normalized > 0 ? "右侧" : "左侧";
        }

        function playGuideStepTo(slot) {
          if (!audioContext || !sfxGain) {
            return;
          }
          const toNote = getNoteWorldPosition(slot).sub(state.position);
          const distance = toNote.length();
          const angle = Math.atan2(toNote.x, -toNote.z) - state.yaw;
          const pan = clamp(Math.sin(angle), -0.85, 0.85);
          const volume = clamp(0.08 + (22 - distance) / 220, 0.045, 0.12);
          playPannedNoise(0.16, volume, 260, pan);
          playTone(210, 0.08, "triangle", 0.028, audioContext.currentTime + 0.08);
        }

        function playPannedNoise(duration, volume, frequency, pan) {
          const bufferSize = Math.max(1, Math.floor(audioContext.sampleRate * duration));
          const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
          const output = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i += 1) {
            output[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
          }
          const source = audioContext.createBufferSource();
          const filter = audioContext.createBiquadFilter();
          const gain = audioContext.createGain();
          const panner = audioContext.createStereoPanner ? audioContext.createStereoPanner() : null;
          source.buffer = buffer;
          filter.type = "lowpass";
          filter.frequency.value = frequency;
          gain.gain.value = volume;
          source.connect(filter);
          filter.connect(gain);
          if (panner) {
            panner.pan.value = pan;
            gain.connect(panner);
            panner.connect(sfxGain);
          } else {
            gain.connect(sfxGain);
          }
          source.start();
        }

        function tick() {
          requestAnimationFrame(tick);
          if (!state.started) {
            return;
          }

          const delta = Math.min(clock.getDelta(), 0.05);
          const time = clock.elapsedTime;

          if (!state.paused && !state.dead) {
            ensureWorldAroundPlayer();
            movePlayer(delta);
            updateCamera();
            updateNearestInteractable();
            updateSurvival(delta);
            updateEntities(delta, time);
            updateLights(time);
            updateAudio();
            saveProgress(false);
            sendNetworkState(false);
            cleanupRemotePlayers();
          }

          if (state.started) {
            expireLocalPlayerAction();
            updateRemoteAvatarsAnimation(time);
            refreshRemoteOutlines();
          }

          updateHud();
          renderer.render(scene, camera);
        }

        function startGame(slotId = "") {
          state.playerExpression = "neutral";
          state.playerAction = "";
          state.playerActionAt = 0;
          state.posePanelOpen = false;
          state.posePanelCollapsed = false;
          state.exitPointerAngleSmooth = null;
          if (!scene) {
            initThree();
            setupControls();
          }
          if (slotId) {
            loadProgress(slotId);
          } else {
            state.activeSaveId = "";
            state.levelIndex = 0;
            state.dead = false;
            state.paused = false;
            state.won = false;
            state.battery = 100;
            state.fear = 0;
            state.flashlightOn = true;
            state.hiddenUntil = 0;
            state.darkTime = 0;
            state.noiseLevel = 0;
            state.sedatedUntil = 0;
            state.glowPowder = 0;
            state.glowMarks = [];
            state.collected = [];
            state.noteIds = [];
            state.inputCode = "";
            state.position.set(0, PLAYER_HEIGHT, 0);
            state.velocity.set(0, 0, 0);
            state.yaw = 0;
            state.pitch = 0;
            createNewSaveFromState();
          }
          clearWorld();
          startAudio();
          state.started = true;
          state.paused = false;
          ui.boot.style.display = "none";
          applyLevelStyle();
          ensureWorldAroundPlayer();
          buildEntities();
          rebuildGlowMarks();
          updateCamera();
          showMessage("醒来时，空气像旧地毯一样潮湿。");
          syncPoseChipUi();
          updatePosePanelVisibility();
          sendNetworkState(true);
          clock.start();
        }

        ui.startButton.addEventListener("click", () => startGame());
        ui.createRoomButton.addEventListener("click", createRoom);
        ui.joinRoomButton.addEventListener("click", () => joinRoom());
        ui.roomInput.addEventListener("input", () => {
          ui.roomInput.value = normalizeRoomId(ui.roomInput.value);
        });
        renderSaveLists();
        tick();
      })();
    </script>
  </body>
</html>
